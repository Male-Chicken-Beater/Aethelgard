<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'EB Garamond',Georgia,serif;background:#0e0e18;color:#d4cbb8;min-height:100vh;min-height:100dvh;overflow-x:hidden}
h1,h2,h3,.heading{font-family:'Cinzel',serif}
.header{text-align:center;padding:16px;border-bottom:1px solid #2a2735;background:#14141f}
.title{font-size:22px;color:#c8a96e;letter-spacing:3px;font-family:'Cinzel',serif}
.sub{font-size:11px;color:#6a6050;letter-spacing:5px;margin-top:2px}
.center{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:calc(100vh - 70px);padding:24px}
.panel{background:#16162a;border:1px solid #2a2a3e;border-radius:10px;padding:20px;max-width:440px;width:100%}
label{display:block;font-size:13px;color:#8a8070;margin:12px 0 4px}
input[type=text],select,textarea{width:100%;padding:10px;font-size:15px;background:#1e1e30;border:1px solid #3a3a50;border-radius:6px;color:#d4cbb8;outline:none;font-family:'EB Garamond',serif;box-sizing:border-box}
input:focus,select:focus,textarea:focus{border-color:#6a5a3a}
textarea{resize:vertical;min-height:60px}
.btn{font-family:'Cinzel',serif;padding:10px 24px;font-size:14px;font-weight:600;background:linear-gradient(135deg,#3a2a1a,#4a3a2a);color:#c8a96e;border:1px solid #6a5a3a;border-radius:8px;cursor:pointer;letter-spacing:1px;display:inline-block}
.btn:hover{background:linear-gradient(135deg,#4a3a2a,#5a4a3a)}
.btn:disabled{opacity:0.4;cursor:default}
.btn-sm{font-family:'Cinzel',serif;padding:6px 14px;font-size:12px;background:#252535;color:#c8a96e;border:1px solid #3a3a4a;border-radius:6px;cursor:pointer}
.btn-sm:hover{background:#333345}
.btn-danger{background:#2a1a1a;border-color:#5a3a3a;color:#c87a6a}
.char-card{background:#1e1e30;border:1px solid #2a2a3e;border-radius:8px;padding:10px;margin-bottom:8px}
.char-name{color:#c8a96e;font-weight:600;font-size:14px}
.char-info{font-size:12px;color:#8a8070}
.char-desc{font-size:12px;color:#7a7060;font-style:italic;margin-top:4px}
.game-wrap{display:flex;flex-direction:column;height:100vh;height:100dvh}
.game-header{padding:8px 16px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid #2a2735;background:#14141f}
.turn-banner{text-align:center;padding:8px;font-size:13px;font-weight:600;letter-spacing:1px;font-family:'Cinzel',serif}
.party-strip{display:flex;gap:2px;padding:6px 12px;background:#12121e;overflow-x:auto}
.party-member{flex:1;min-width:70px;padding:4px 8px;border-radius:4px;text-align:center}
.narrative{flex:1;overflow-y:auto;padding:12px 16px;display:flex;flex-direction:column;gap:12px}
.msg-dm{background:#1a1a2e;border-left:3px solid #c8a96e;padding:12px 14px;border-radius:0 8px 8px 0;font-size:14px;line-height:1.7;white-space:pre-wrap}
.msg-player{background:#1e2a1e;border-left:3px solid #6aaf6a;padding:10px 14px;border-radius:0 8px 8px 0;font-size:14px;line-height:1.5}
.msg-system{text-align:center;font-size:13px;color:#c8a96e;font-weight:600;padding:8px;letter-spacing:2px;font-family:'Cinzel',serif}
.msg-dice{text-align:center;font-size:13px;color:#ffb74d;padding:4px;font-style:italic}
.player-tag{font-size:11px;font-weight:600;color:#6aaf6a;margin-bottom:4px}
.input-bar{display:flex;gap:8px;padding:12px 16px;border-top:1px solid #2a2735;background:#14141f}
.input-bar input{flex:1;font-size:14px;padding:10px}
.footer-bar{display:flex;justify-content:space-between;padding:4px 16px 8px;background:#14141f;font-size:10px;color:#4a4540}
.footer-bar span{cursor:pointer}
.footer-bar span:hover{color:#8a8070}
.status-dot{display:inline-block;width:6px;height:6px;border-radius:50%;margin-right:4px}
.online{background:#6aaf6a}
.connecting{background:#e8a832}
@media(max-width:480px){.title{font-size:18px}.party-member{min-width:60px}}
</style>

// ============================================================
// SYSTEM PROMPT — Full Aethelgard DM instructions
// ============================================================

const SYSTEM_PROMPT = `You are the Dungeon Master for "Aethelgard: Storm of the Dragon," a D&D 5e campaign set on a Norse-inspired island. You run a grimdark-but-grounded game with theater of the mind. Your tone is literary, immersive, and human. NPCs feel like real people with opinions and lives.

WORLD: Aethelgard is a remote island in a cold northern sea. ~5,000 people. Norse culture. Three gods: Thunraz (storms/warriors), Hælfesta (hearth/community), Siglvætr (sea/fortune). Druids worship Silvanus/the Green Man.

LOCATIONS: Járnhavn (iron capital, harbor city, north coast, 2000+ people, Jarl's Council seat). Vollhaven (central crossroads, farming town). Warmsprings (hot springs, neutral ground, south of Vollhaven). Baile Draighean (southern frontier village). Grandmother's Wood (ancient fey-guarded forest, NW interior). Grove of Gwynneth (druid sanctuary, southern peninsula). Lochvarn (destroyed town, east shore of Mirror Lake). Skógheim (lumber village, edge of Grandmother's Wood). Coastal Caves (old iron glass mines, west coast). Chapel of Quiet Rest (isolated graveyard, north foothills). God's Reach (western mountain, dragon's lair at summit). Ruined City/Kohr'borg (hidden by illusion, west shore Mirror Lake). Seálad Thair (hidden pocket dimension, base of God's Reach).

STARTING SITUATION: The party survived Lochvarn's destruction by a massive storm (actually dragon attack by Ushathen). They are refugees fleeing south to Vollhaven. They arrive with almost nothing. The campaign begins on the road to Vollhaven or arriving there.

KEY NPCs:
- Elara Meadowlight: Innkeeper at The Meadow Hearth in Vollhaven. Warm, perceptive, grieving. Father Aldric disappeared into Grandmother's Wood 2 years ago. Wears silver pendant with blue stone. First ally and connection to main quest.
- Anya Stonehand: Dwarf military commander, Járnhavn. Pragmatic, honorable, direct. Scar temple to jaw. Jarl's Council faction.
- Zephyr: Tiefling, Shadow Market leader, Járnhavn. Charming, dangerous, pragmatic. Criminal faction.
- Cog Thornwrench: Goblin artificer. Workshop NE of Baile Draighean. Brilliant, rude, lonely. Builds the Seer's Lens. Won't leave workshop. Raised by Merrick (human scholar, dead). Aldric was Merrick's friend.
- Sigurd: Chief Archivist, Járnhavn. Elderly, meticulous, excited by knowledge.
- Grandmother Moira: Archdruid, Grove of Gwynneth. Ancient, powerful, cryptic.
- Father Kaelen: Priest at Chapel of Quiet Rest. Believes he serves death god Nergal. Nergal is dead 1000 years. Voice answering prayers is Valerius. Every soul Kaelen consecrated for 300 years fueled undead army. Kaelen doesn't know.
- Valerius: Circle builder enslaved by Ushathen, turned lich. Ruined City. Undead army. Tragic. Below waist twisted into dark chitin spider-like legs.
- Brick Hagen: Half-orc pugilist. Underground fighting ring, Járnhavn.
- Thordak Ironbrow: Dwarf master smith, Járnhavn.

THE ORMHJARTA: Crystalline artifact, 6 inches tall, swirling blue/gold/violet. Warm. Pulses like heartbeat. Attracts dragons. Amplifies magic. Causes madness. Hidden in Seálad Thair by circle builders (Veth'sithe) 2000+ years ago.

USHATHEN: Ancient dragon, 1000+ years old. Destroyed Lochvarn. Controls Valerius. Lair at God's Reach summit. NOT a surprise boss — his presence escalates: worsening storms, lightning near allies, scorched Draconic messages.

MAIN QUEST: Find Aldric's journal (Grandmother's Wood) → Meet Cog → Gather 6 components for Seer's Lens (Moonpetal Crystal, Heartwood, Glowcap Fungus, Cold Stone, Iron Glass, Stormglass) → Find Seálad Thair → Complete trials → Claim Ormhjarta → Confront Ushathen.

FACTIONS: Party must choose Anya (Council) or Zephyr (Shadow Market), or play both. Choice reshapes island response.

FIVE ENDINGS: Destroy Ormhjarta, contain at Three Stones, use its power, surrender to Ushathen, sacrifice a party member to seal it.

SURVIVAL ECONOMY: Money matters. Gear degrades. Travel takes real time. Food costs money.

DM RULES:
- Roll dice for uncertain outcomes. Format: [d20+mod = result vs DC X — success/failure]
- Run combat with initiative, attack rolls, damage. Keep it fast.
- Address players by character name. When it's a specific player's turn, address them directly.
- Describe environments vividly but concisely. Keep responses under 300 words unless major scene.
- NPCs have personality, moods, bad days. Not quest dispensers.
- Ask "What do you do?" after scenes.
- The world reacts to choices. Actions have consequences.`;

// ============================================================
// GAME CONSTANTS
// ============================================================

const RACES = ["Human","Dwarf","Elf","Half-Elf","Halfling","Gnome","Half-Orc","Tiefling","Goliath"];
const CLASSES = ["Fighter","Rogue","Wizard","Cleric","Ranger","Barbarian","Bard","Paladin","Druid","Warlock","Monk","Pugilist"];
const BACKGROUNDS = ["Soldier","Sailor","Folk Hero","Outlander","Acolyte","Criminal","Artisan","Scholar","Entertainer","Hermit"];

// ============================================================
// FIREBASE INIT
// ============================================================

let db;
try {
  firebase.initializeApp(firebaseConfig);
  db = firebase.database();
} catch(e) {
  document.getElementById('app').innerHTML = `<div class="center"><div class="panel"><h2 style="color:#c87a6a;font-size:16px;text-align:center">Firebase Not Configured</h2><p style="color:#8a8070;font-size:13px;margin-top:12px;text-align:center">Open this HTML file in a text editor and paste your Firebase config where it says PASTE_YOUR_FIREBASE_CONFIG_HERE. See SETUP_GUIDE.md for instructions.</p></div></div>`;
  throw e;
}

// ============================================================
// STATE
// ============================================================

let state = { phase: "join", playerName: "", game: null, narrative: null, loading: false, actionText: "" };
let charForm = { name: "", race: "Human", class: "Fighter", background: "Outlander", desc: "" };
let localPlayer = "";
let unsubscribers = [];

// ============================================================
// FIREBASE HELPERS
// ============================================================

function fbSet(path, val) { return db.ref(path).set(val); }
function fbGet(path) { return db.ref(path).once('value').then(s => s.val()); }
function fbListen(path, cb) {
  const ref = db.ref(path);
  ref.on('value', snap => cb(snap.val()));
  unsubscribers.push(() => ref.off('value'));
}

// ============================================================
// ANTHROPIC API
// ============================================================

async function callDM(messages) {
  try {
    const res = await fetch(PROXY_URL, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        model: "claude-sonnet-4-20250514",
        max_tokens: 1000,
        system: SYSTEM_PROMPT,
        messages: messages.slice(-40),
      }),
    });
    const data = await res.json();
    if (data.error) return "⚠ API Error: " + (data.error.message || "Unknown error. Check your proxy setup.");
    return data.content?.map(b => b.text || "").join("\n") || "The DM pauses, gathering thoughts...";
  } catch (e) {
    return "⚠ Connection error. Check your internet and proxy URL.";
  }
}

// ============================================================
// GAME LOGIC
// ============================================================

function getHp(cls) { return ({Barbarian:14,Wizard:8,Fighter:12,Paladin:12,Pugilist:12})[cls] || 10; }
function getAc(cls) { return ({Barbarian:13,Wizard:11,Monk:13,Pugilist:13})[cls] || 14; }

async function joinGame() {
  const name = state.playerName.trim();
  if (!name) return;
  localPlayer = name;
  let game = await fbGet('game');
  if (!game) {
    game = { players: {}, started: false, currentTurn: 0, turnOrder: [], host: name };
  }
  const playerCount = Object.keys(game.players || {}).length;
  if (playerCount >= 4 && !game.players[name]) { alert("Game is full (4 players max)"); return; }
  if (!game.players) game.players = {};
  if (!game.players[name]) game.players[name] = { joined: true };
  await fbSet('game', game);
  
  // Start listening
  fbListen('game', g => { state.game = g; render(); });
  fbListen('narrative', n => { state.narrative = n; render(); scrollNarrative(); });
  
  if (game.players[name]?.character) {
    state.phase = game.started ? "play" : "lobby";
  } else {
    state.phase = "character";
  }
  render();
}

async function saveCharacter() {
  if (!charForm.name.trim()) { alert("Give your character a name"); return; }
  const hp = getHp(charForm.class);
  const char = {
    charName: charForm.name.trim(), race: charForm.race, class: charForm.class,
    background: charForm.background, desc: charForm.desc,
    hp, maxHp: hp, ac: getAc(charForm.class), level: 1, gold: 5,
    inventory: "Backpack, Waterskin, Rations (3 days), Bedroll"
  };
  await fbSet(`game/players/${localPlayer}/character`, char);
  state.phase = "lobby";
  render();
}

async function startGame() {
  const game = await fbGet('game');
  const ready = Object.entries(game.players || {}).filter(([k,v]) => v.character).map(([k]) => k);
  if (ready.length < 2) { alert("Need at least 2 players with characters"); return; }
  game.started = true;
  game.turnOrder = ready;
  game.currentTurn = 0;
  await fbSet('game', game);

  const charList = ready.map(p => {
    const c = game.players[p].character;
    return `${c.charName} (${c.race} ${c.class}, ${c.background}) — played by ${p}. ${c.desc || ""}`;
  }).join("\n");

  const first = game.players[ready[0]].character.charName;
  const openingPrompt = `The campaign begins. Here are the player characters:\n\n${charList}\n\nThese characters just survived the destruction of Lochvarn. They are on the road south, battered, exhausted, with almost nothing. It is mid-spring, cold air, smoke visible on the northern horizon. Set the opening scene. Address the party, describe what they see and feel, then prompt ${first} to act.`;

  state.loading = true; render();
  const response = await callDM([{ role: "user", content: openingPrompt }]);
  
  const narrative = {
    entries: [
      { t: "system", text: "⚔ The campaign begins. ⚔" },
      { t: "dm", text: response }
    ],
    conversation: [
      { role: "user", content: openingPrompt },
      { role: "assistant", content: response }
    ]
  };
  await fbSet('narrative', narrative);
  state.loading = false;
  state.phase = "play";
  render();
}

async function submitAction() {
  const action = state.actionText.trim();
  if (!action || state.loading) return;
  
  const game = await fbGet('game');
  const currentPlayer = game.turnOrder[game.currentTurn];
  if (currentPlayer !== localPlayer) return;
  
  const char = game.players[currentPlayer].character;
  const narr = await fbGet('narrative') || { entries: [], conversation: [] };
  state.actionText = "";
  
  // Add player action
  narr.entries.push({ t: "player", player: currentPlayer, charName: char.charName, text: action });

  // Dice rolls
  let diceNote = "";
  const dm = action.match(/\/roll\s+(\d*)d(\d+)([+-]\d+)?/i);
  if (dm) {
    const cnt = parseInt(dm[1]) || 1, sides = parseInt(dm[2]), mod = parseInt(dm[3]) || 0;
    const rolls = Array.from({length:cnt}, () => Math.floor(Math.random()*sides)+1);
    const total = rolls.reduce((a,b)=>a+b,0) + mod;
    diceNote = `\n[🎲 ${cnt}d${sides}${mod>=0?"+":""}${mod}: ${rolls.join(", ")} = ${total}]`;
    narr.entries.push({ t: "dice", text: `🎲 ${char.charName} rolls ${cnt}d${sides}${mod?(mod>0?"+":"")+mod:""}: [${rolls.join(", ")}] = ${total}` });
  }

  await fbSet('narrative', narr);
  state.loading = true; render();

  // DM call
  const nextIdx = (game.currentTurn + 1) % game.turnOrder.length;
  const nextChar = game.players[game.turnOrder[nextIdx]].character.charName;
  const playerMsg = `[${char.charName} (${char.race} ${char.class}, Lv${char.level}, HP ${char.hp}/${char.maxHp}, AC ${char.ac}) — player: ${currentPlayer}]\n\n${char.charName}'s action: ${action}${diceNote}\n\nResolve this action, advance the scene, then prompt ${nextChar} to act next.`;
  
  const conv = [...(narr.conversation || []), { role: "user", content: playerMsg }];
  const trimmed = conv.length > 40 ? conv.slice(-40) : conv;
  const response = await callDM(trimmed);

  // Advance turn
  game.currentTurn = nextIdx;
  await fbSet('game/currentTurn', game.currentTurn);

  narr.entries.push({ t: "dm", text: response });
  narr.conversation = [...trimmed, { role: "assistant", content: response }];
  await fbSet('narrative', narr);
  
  state.loading = false;
  render();
}

async function resetGame() {
  if (!confirm("Delete the entire campaign for ALL players?")) return;
  await fbSet('game', null);
  await fbSet('narrative', null);
  unsubscribers.forEach(fn => fn());
  unsubscribers = [];
  localPlayer = "";
  state = { phase: "join", playerName: "", game: null, narrative: null, loading: false, actionText: "" };
  render();
}

// ============================================================
// RENDER
// ============================================================

function scrollNarrative() {
  setTimeout(() => { const el = document.getElementById('narr-end'); if(el) el.scrollIntoView({behavior:'smooth'}); }, 100);
}

function render() {
  const app = document.getElementById('app');
  const g = state.game;
  
  // JOIN
  if (state.phase === "join") {
    app.innerHTML = `
      <div class="header"><h1 class="title">AETHELGARD</h1><div class="sub">STORM OF THE DRAGON</div></div>
      <div class="center"><div class="panel">
        <div style="text-align:center;margin-bottom:16px">
          <div style="font-size:16px;color:#c8a96e;font-weight:600;font-family:Cinzel,serif">⚔ Join Campaign ⚔</div>
          <div style="font-size:12px;color:#6a6050;margin-top:4px">Enter your player name</div>
        </div>
        <label>Your Name</label>
        <input type="text" id="nameIn" placeholder="e.g. Nathan" onkeydown="if(event.key==='Enter')joinGame()">
        <div style="text-align:center"><button class="btn" onclick="state.playerName=document.getElementById('nameIn').value;joinGame()">Enter</button></div>
      </div></div>`;
    return;
  }

  // CHARACTER
  if (state.phase === "character") {
    app.innerHTML = `
      <div class="header"><h1 class="title">AETHELGARD</h1><div class="sub">CREATE YOUR CHARACTER</div></div>
      <div class="center"><div class="panel">
        <div style="text-align:center;font-size:12px;color:#6a6050;margin-bottom:8px">You survived Lochvarn's destruction. Who are you?</div>
        <label>Character Name</label>
        <input type="text" id="cName" value="${charForm.name}" placeholder="e.g. Mörka">
        <label>Race</label>
        <select id="cRace">${RACES.map(r=>`<option ${r===charForm.race?'selected':''}>${r}</option>`).join('')}</select>
        <label>Class</label>
        <select id="cClass">${CLASSES.map(c=>`<option ${c===charForm.class?'selected':''}>${c}</option>`).join('')}</select>
        <label>Background</label>
        <select id="cBg">${BACKGROUNDS.map(b=>`<option ${b===charForm.background?'selected':''}>${b}</option>`).join('')}</select>
        <label>Brief Description (optional)</label>
        <textarea id="cDesc" placeholder="Appearance, personality, quirks...">${charForm.desc}</textarea>
        <div style="text-align:center"><button class="btn" onclick="charForm.name=document.getElementById('cName').value;charForm.race=document.getElementById('cRace').value;charForm.class=document.getElementById('cClass').value;charForm.background=document.getElementById('cBg').value;charForm.desc=document.getElementById('cDesc').value;saveCharacter()">Create Character</button></div>
      </div></div>`;
    return;
  }

  // LOBBY
  if (state.phase === "lobby") {
    const players = g?.players ? Object.entries(g.players) : [];
    const ready = players.filter(([k,v]) => v.character);
    const isHost = g?.host === localPlayer;
    app.innerHTML = `
      <div class="header"><h1 class="title">AETHELGARD</h1><div class="sub">WAITING FOR PARTY</div></div>
      <div class="center"><div class="panel">
        <div style="text-align:center;margin-bottom:12px">
          <div style="font-size:15px;color:#c8a96e;font-weight:600;font-family:Cinzel,serif">The Party Gathers...</div>
          <div style="font-size:12px;color:#6a6050;margin-top:4px">Share this page's URL with your friends</div>
        </div>
        ${players.map(([p,v]) => {
          const c = v.character;
          return `<div class="char-card">${c ? `
            <div class="char-name">${c.charName}</div>
            <div class="char-info">${c.race} ${c.class} (${c.background})</div>
            <div class="char-info">Player: ${p} ${p===g.host?'👑':''}</div>
            ${c.desc?`<div class="char-desc">${c.desc}</div>`:''}
          ` : `<div style="color:#6a6050;font-size:13px">${p} — creating character...</div>`}</div>`;
        }).join('')}
        <div style="text-align:center;margin-top:12px;font-size:12px;color:#6a6050">${ready.length}/${players.length} ready · Up to 4 players</div>
        ${isHost && ready.length >= 2 ? `<div style="text-align:center"><button class="btn" onclick="startGame()">⚔ Begin Campaign ⚔</button></div>` : ''}
        ${isHost && ready.length < 2 ? `<div style="text-align:center;margin-top:12px;font-size:12px;color:#8a6050">Need at least 2 players with characters</div>` : ''}
        ${!isHost ? `<div style="text-align:center;margin-top:12px;font-size:12px;color:#6a6050">Waiting for ${g?.host} to start...</div>` : ''}
        <div style="text-align:center;margin-top:16px"><button class="btn-sm btn-danger" onclick="resetGame()">Reset Game</button></div>
      </div></div>`;
    
    // Auto-advance to play if game started while in lobby
    if (g?.started) { state.phase = "play"; render(); }
    return;
  }

  // PLAY
  if (state.phase === "play") {
    if (!g) return;
    const players = g.players || {};
    const turnOrder = g.turnOrder || [];
    const currentTurnPlayer = turnOrder[g.currentTurn || 0];
    const currentTurnChar = players[currentTurnPlayer]?.character;
    const isMyTurn = currentTurnPlayer === localPlayer;
    const myChar = players[localPlayer]?.character;
    const entries = state.narrative?.entries || [];

    app.innerHTML = `
      <div class="game-wrap">
        <div class="game-header">
          <div><div class="title" style="font-size:16px;letter-spacing:2px">AETHELGARD</div></div>
          <div style="text-align:right">${myChar ? `<div style="font-size:11px;color:#8a8070">${myChar.charName} · HP ${myChar.hp}/${myChar.maxHp} · AC ${myChar.ac} · Lv${myChar.level} · ${myChar.gold}gp</div>` : ''}</div>
        </div>
        <div class="turn-banner" style="background:${isMyTurn?'#1a2a1a':'#1a1a2e'};color:${isMyTurn?'#6aaf6a':'#c8a96e'};border-bottom:2px solid ${isMyTurn?'#6aaf6a':'#c8a96e'}">
          ${state.loading ? '⏳ The DM weaves the tale...' : isMyTurn ? `⚔ YOUR TURN — ${myChar?.charName||''}` : `⏳ ${currentTurnChar?.charName||'...'}'s turn (${currentTurnPlayer||'...'})`}
        </div>
        <div class="party-strip">
          ${turnOrder.map((p,i) => {
            const c = players[p]?.character;
            const cur = i === (g.currentTurn||0);
            return `<div class="party-member" style="background:${cur?'#2a3a2a':'#1a1a28'};border:1px solid ${cur?'#6aaf6a55':'#2a2a3e'}">
              <div style="font-size:11px;font-weight:600;color:${cur?'#6aaf6a':'#8a8070'}">${c?.charName||p} ${cur?'◆':''}</div>
              <div style="font-size:9px;color:#5a5045">HP ${c?.hp||'?'}/${c?.maxHp||'?'}</div>
            </div>`;
          }).join('')}
        </div>
        <div class="narrative" id="narrative">
          ${entries.map((e,i) => {
            if(e.t==='system') return `<div class="msg-system">${esc(e.text)}</div>`;
            if(e.t==='dice') return `<div class="msg-dice">${esc(e.text)}</div>`;
            if(e.t==='dm') return `<div class="msg-dm">${esc(e.text)}</div>`;
            if(e.t==='player') return `<div><div class="player-tag">⚔ ${esc(e.charName)} (${esc(e.player)})</div><div class="msg-player">${esc(e.text)}</div></div>`;
            return '';
          }).join('')}
          ${state.loading ? '<div class="msg-system" style="font-size:12px;color:#6a6050">⏳ The DM is writing...</div>' : ''}
          <div id="narr-end"></div>
        </div>
        <div class="input-bar">
          <input type="text" id="actionIn" value="${esc(state.actionText)}" placeholder="${isMyTurn ? 'What does '+(myChar?.charName||'your character')+' do?' : 'Waiting for '+(currentTurnChar?.charName||'...')+'...'}" ${!isMyTurn||state.loading?'disabled':''} onkeydown="if(event.key==='Enter'){state.actionText=this.value;submitAction()}">
          <button class="btn-sm" style="padding:10px 16px;opacity:${isMyTurn&&!state.loading?1:0.4}" onclick="state.actionText=document.getElementById('actionIn').value;submitAction()" ${!isMyTurn||state.loading?'disabled':''}>▸</button>
        </div>
        <div class="footer-bar">
          <span>Type /roll 1d20+3 for dice</span>
          <span onclick="resetGame()">Reset</span>
        </div>
      </div>`;
    scrollNarrative();
    
    // Focus input if my turn
    if (isMyTurn && !state.loading) {
      const inp = document.getElementById('actionIn');
      if (inp && !inp.matches(':focus')) inp.focus();
    }
    return;
  }
}

function esc(s) { if(!s) return ''; const d=document.createElement('div'); d.textContent=s; return d.innerHTML; }

// ============================================================
// BOOT
// ============================================================

render();
</script>
</body>
</html>
