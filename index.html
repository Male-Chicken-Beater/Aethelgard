<html lang="en">
<head>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=EB+Garamond:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'EB Garamond',Georgia,serif;background:#0e0e18;color:#d4cbb8;min-height:100vh;min-height:100dvh;overflow-x:hidden}
h1,h2,h3,.heading{font-family:'Cinzel',serif}
.header{text-align:center;padding:16px;border-bottom:1px solid #2a2735;background:#14141f}
.title{font-size:22px;color:#c8a96e;letter-spacing:3px;font-family:'Cinzel',serif}
.sub{font-size:11px;color:#6a6050;letter-spacing:5px;margin-top:2px}
.center{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:calc(100vh - 70px);padding:24px}
.panel{background:#16162a;border:1px solid #2a2a3e;border-radius:10px;padding:20px;max-width:440px;width:100%}
label{display:block;font-size:13px;color:#8a8070;margin:12px 0 4px}
input[type=text],input[type=number],select,textarea{width:100%;padding:10px;font-size:15px;background:#1e1e30;border:1px solid #3a3a50;border-radius:6px;color:#d4cbb8;outline:none;font-family:'EB Garamond',serif;box-sizing:border-box}
input:focus,select:focus,textarea:focus{border-color:#6a5a3a}
textarea{resize:vertical;min-height:60px}
.btn{font-family:'Cinzel',serif;padding:10px 24px;font-size:14px;font-weight:600;background:linear-gradient(135deg,#3a2a1a,#4a3a2a);color:#c8a96e;border:1px solid #6a5a3a;border-radius:8px;cursor:pointer;letter-spacing:1px;display:inline-block}
.btn:hover{background:linear-gradient(135deg,#4a3a2a,#5a4a3a)}
.btn:disabled{opacity:0.4;cursor:default}
.btn-sm{font-family:'Cinzel',serif;padding:6px 14px;font-size:12px;background:#252535;color:#c8a96e;border:1px solid #3a3a4a;border-radius:6px;cursor:pointer}
.btn-sm:hover{background:#333345}
.btn-danger{background:#2a1a1a;border-color:#5a3a3a;color:#c87a6a}
.char-card{background:#1e1e30;border:1px solid #2a2a3e;border-radius:8px;padding:10px;margin-bottom:8px}
.char-name{color:#c8a96e;font-weight:600;font-size:14px}
.char-info{font-size:12px;color:#8a8070}
.char-desc{font-size:12px;color:#7a7060;font-style:italic;margin-top:4px}
.game-wrap{display:flex;flex-direction:column;height:100vh;height:100dvh}

.party-member{flex:1;min-width:70px;padding:4px 8px;border-radius:4px;text-align:center;cursor:pointer}
.narrative{flex:1;overflow-y:auto;padding:12px 16px;display:flex;flex-direction:column;gap:12px}
.msg-dm{background:#1a1a2e;border-left:3px solid #c8a96e;padding:12px 14px;border-radius:0 8px 8px 0;font-size:14px;line-height:1.7;white-space:pre-wrap}
.msg-player{background:#1e2a1e;border-left:3px solid #6aaf6a;padding:10px 14px;border-radius:0 8px 8px 0;font-size:14px;line-height:1.5}
.msg-system{text-align:center;font-size:13px;color:#c8a96e;font-weight:600;padding:8px;letter-spacing:2px;font-family:'Cinzel',serif}
.msg-dice{text-align:center;font-size:13px;color:#ffb74d;padding:4px;font-style:italic}
.player-tag{font-size:11px;font-weight:600;color:#6aaf6a;margin-bottom:4px}
.input-bar{display:flex;gap:8px;padding:12px 16px;border-top:1px solid #2a2735;background:#14141f}
.input-bar input{flex:1;font-size:14px;padding:10px}
.footer-bar{display:flex;justify-content:space-between;padding:4px 16px 8px;background:#14141f;font-size:10px;color:#4a4540}
.footer-bar span{cursor:pointer}.footer-bar span:hover{color:#8a8070}
.slide-panel{position:fixed;top:0;right:-100%;width:min(380px,90vw);height:100%;background:#12121e;border-left:2px solid #2a2735;z-index:100;transition:right 0.3s ease;display:flex;flex-direction:column;overflow:hidden}
.slide-panel.open{right:0}
.slide-panel-header{padding:12px 16px;border-bottom:1px solid #2a2735;background:#14141f;display:flex;justify-content:space-between;align-items:center}

.slide-panel-close{cursor:pointer;color:#6a6050;font-size:20px}.slide-panel-close:hover{color:#c8a96e}
.slide-panel-body{flex:1;overflow-y:auto;padding:12px 16px}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:99;display:none}.overlay.open{display:block}
.toolbar{display:flex;gap:4px;padding:4px 12px;background:#12121e;border-bottom:1px solid #2a2735;flex-wrap:wrap}
.toolbar-btn{font-family:'Cinzel',serif;padding:5px 10px;font-size:10px;letter-spacing:1px;background:#1a1a2e;color:#8a8070;border:1px solid #2a2a3e;border-radius:4px;cursor:pointer}
.toolbar-btn:hover{color:#c8a96e;border-color:#c8a96e44}
.sheet-section{margin-bottom:16px}
.sheet-section h3{font-size:12px;color:#c8a96e;letter-spacing:1px;margin-bottom:8px;padding-bottom:4px;border-bottom:1px solid #2a2a3e}
.sheet-row{display:flex;justify-content:space-between;align-items:center;padding:4px 0;font-size:13px}
.sheet-row .lbl{color:#8a8070}
.slot-pip{display:inline-block;width:16px;height:16px;border-radius:50%;border:2px solid #6a5a3a;cursor:pointer;margin-right:3px}
.slot-pip.used{background:#6a5a3a}.slot-pip.available{background:transparent}
.inv-item{display:flex;justify-content:space-between;align-items:center;padding:4px 0;font-size:13px;border-bottom:1px solid #1e1e30}
.inv-item .del{cursor:pointer;color:#5a4a4a;font-size:11px}.inv-item .del:hover{color:#c87a6a}
.inv-add{display:flex;gap:4px;margin-top:6px}.inv-add input{flex:1;padding:6px;font-size:12px}
.cal-date{text-align:center;padding:12px;background:#1a1a2e;border-radius:8px;margin-bottom:12px}
.cal-day{font-size:28px;color:#c8a96e;font-weight:700;font-family:'Cinzel',serif}
.cal-month{font-size:14px;color:#d4cbb8;margin-top:2px}
.cal-season{font-size:11px;color:#8a8070}
.cal-controls{display:flex;gap:4px;justify-content:center;flex-wrap:wrap;margin-bottom:12px}
.cal-grid{display:grid;grid-template-columns:repeat(10,1fr);gap:3px;margin-bottom:12px}
.cal-cell{aspect-ratio:1;display:flex;align-items:center;justify-content:center;border-radius:3px;cursor:pointer;font-size:12px}
.cal-cell:hover{transform:scale(1.1)}
.cal-cell.today{font-weight:700;color:#fff}
@media(max-width:480px){.title{font-size:18px}.party-member{min-width:60px}.slide-panel{width:100%}}
</style>

<script>
const firebaseConfig={apiKey:"AIzaSyD7rwt_Wm6tZ_nVTaK94M1R0Ppsed8CpiU",authDomain:"aethelgard-f0828.firebaseapp.com",databaseURL:"https://aethelgard-f0828-default-rtdb.firebaseio.com",projectId:"aethelgard-f0828",storageBucket:"aethelgard-f0828.firebasestorage.app",messagingSenderId:"501726848128",appId:"1:501726848128:web:adae851f62445d3c36b265"};
const PROXY_URL="https://aethelgard-proxy.nathan13mcclelland.workers.dev";
const SYSTEM_PROMPT=`You are the Dungeon Master for "Aethelgard: Storm of the Dragon," a D&D 5e campaign on a Norse-inspired island. Grimdark-but-grounded, theater of the mind. NPCs are real people with opinions.
WORLD: Aethelgard, remote island, ~5000 people, Norse culture. Gods: Thunraz (storms), Hælfesta (hearth), Siglvætr (sea). Druids worship Silvanus.
LOCATIONS: Járnhavn (iron capital, north). Vollhaven (central crossroads). Warmsprings (hot springs, south of Vollhaven). Baile Draighean (southern frontier). Grandmother's Wood (fey forest, NW interior). Grove of Gwynneth (druid sanctuary, south peninsula). Lochvarn (destroyed, east Mirror Lake). Skógheim (lumber village). Coastal Caves (west coast). Chapel of Quiet Rest (north foothills). God's Reach (western mountain, dragon lair). Ruined City/Kohr'borg (hidden, west Mirror Lake). Seálad Thair (pocket dimension, base of God's Reach).
KEY NPCs: Elara Meadowlight (innkeeper Vollhaven, father Aldric missing 2yrs). Anya Stonehand (dwarf commander). Zephyr (tiefling, Shadow Market). Cog Thornwrench (goblin artificer, builds Seer's Lens). Sigurd (archivist). Grandmother Moira (archdruid). Father Kaelen (priest, unknowingly serves Valerius not dead god Nergal). Valerius (lich, enslaved by Ushathen). Brick Hagen (half-orc pugilist). Thordak Ironbrow (master smith).
ORMHJARTA: Crystalline artifact, attracts dragons, amplifies magic, causes madness. Hidden in Seálad Thair.
USHATHEN: Ancient dragon 1000+ yrs. Destroyed Lochvarn. NOT surprise boss—escalates throughout.
QUEST: Find Aldric's journal → Meet Cog → 6 components for Seer's Lens → Seálad Thair → Ormhjarta → Confront Ushathen. Five endings.
FACTIONS: Anya (Council/lawful) vs Zephyr (Shadow Market/criminal).
SURVIVAL ECONOMY: Money matters. Gear degrades. Travel takes real time.
DM RULES: Roll dice for uncertain outcomes [d20+mod = result vs DC X]. Run combat fast. Address by character name. Under 300 words unless major scene. NPCs have personality. Ask "What do you do?" World reacts to choices.
The current campaign date will be provided with each message. Reference seasons and weather naturally.`;

const RACES=["Human","Dwarf","Elf","Half-Elf","Halfling","Gnome","Half-Orc","Tiefling","Goliath"];
const CLASSES=["Fighter","Rogue","Wizard","Cleric","Ranger","Barbarian","Bard","Paladin","Druid","Warlock","Monk","Pugilist"];
const BACKGROUNDS=["Soldier","Sailor","Folk Hero","Outlander","Acolyte","Criminal","Artisan","Scholar","Entertainer","Hermit"];
const MONTHS=[{n:1,name:"Frostmoot",s:"Deep Winter",c:"#4a6fa5",i:"❄️"},{n:2,name:"Stormveil",s:"Late Winter",c:"#5a7fb5",i:"🌊"},{n:3,name:"Seedwake",s:"Early Spring",c:"#6aaf6a",i:"🌱"},{n:4,name:"Bloomtide",s:"Spring",c:"#7cc47c",i:"🌸"},{n:5,name:"Brightsun",s:"Late Spring",c:"#c4cc54",i:"☀️"},{n:6,name:"Highflame",s:"Midsummer",c:"#e8a832",i:"🔥"},{n:7,name:"Goldreap",s:"Summer",c:"#e8c832",i:"🌾"},{n:8,name:"Longshadow",s:"Late Summer",c:"#d4a844",i:"🌅"},{n:9,name:"Harvestwane",s:"Autumn",c:"#c47834",i:"🍂"},{n:10,name:"Duskmire",s:"Late Autumn",c:"#8a6a4a",i:"🌫️"},{n:11,name:"Greyveil",s:"Early Winter",c:"#6a7a8a",i:"🌧️"},{n:12,name:"Hearthrest",s:"Winter",c:"#3a5a7a",i:"🕯️"}];
const DPM=30;
const HOLY=[{m:1,d:1,name:"New Year's Blessing",g:"All Three",desc:"Offerings",cl:"#ffd700"},{m:2,d:15,name:"Fortune's Night",g:"Siglvætr",desc:"Gambling celebrated",cl:"#4fc3f7"},{m:3,d:20,name:"Spring Equinox",g:"Silvanus, Hælfesta",desc:"First Planting",cl:"#66bb6a"},{m:4,d:15,name:"Motherday",g:"Hælfesta",desc:"Honoring mothers",cl:"#ef9a9a"},{m:6,d:21,name:"Summer Solstice",g:"Thunraz, Silvanus",desc:"Storm Festival",cl:"#ffb74d"},{m:9,d:22,name:"Autumn Equinox",g:"Silvanus, Hælfesta",desc:"Harvest Festival",cl:"#a1887f"},{m:10,d:15,name:"Wild Hunt",g:"Silvanus",desc:"Stay indoors",cl:"#7e57c2"},{m:12,d:21,name:"Winter Solstice",g:"All",desc:"Hearthnight",cl:"#90caf9"}];
const WX={"Deep Winter":["Heavy snow","Blizzard","Bitter cold","Freezing rain","Grey"],"Late Winter":["Snow flurries","Sleet","Cold rain","Fog","Wind"],"Early Spring":["Cold rain","Frost","Warming breeze","Mud","Patchy sun"],"Spring":["Warm rain","Clear","Gentle wind","Mist","Thundershowers"],"Late Spring":["Warm & bright","Clouds","Humid","Evening storms","Clear"],"Midsummer":["Hot & still","Scorching","Dry heat","Thunder","Balmy"],"Summer":["Golden","Breeze","Hazy","Occasional rain","Long twilight"],"Late Summer":["Cool nights","Harvest wind","Dew","Amber light","Dawn fog"],"Autumn":["Cool rain","Crisp air","Leaves falling","Frost","Overcast"],"Late Autumn":["Cold fog","First snow","Bitter wind","Dark skies","Freezing"],"Early Winter":["Grey skies","Snow showers","Ice rain","Short days","Howling wind"],"Winter":["Deep snow","Clear & cold","Ice storms","Firelight","Still air"]};
const SPELL_SLOTS={2:{1:2},3:{1:3},4:{1:3},5:{1:4,2:2},6:{1:4,2:2},7:{1:4,2:3},8:{1:4,2:3},9:{1:4,2:3,3:2}};
const CASTER_CLASSES=["Wizard","Cleric","Druid","Bard","Paladin","Warlock","Ranger"];

let db;try{firebase.initializeApp(firebaseConfig);db=firebase.database()}catch(e){document.getElementById('app').innerHTML='<div class="center"><div class="panel"><p style="color:#c87a6a;text-align:center">Firebase error</p></div></div>';throw e}

let S={phase:"join",pn:"",game:null,narr:null,loading:false,act:""},CF={name:"",race:"Human",cls:"Fighter",bg:"Outlander",desc:"",str:"10",dex:"10",con:"10",int:"10",wis:"10",cha:"10"},LP="";

function fbS(p,v){return db.ref(p).set(v)}function fbG(p){return db.ref(p).once('value').then(s=>s.val())}function fbL(p,cb){db.ref(p).on('value',s=>cb(s.val()))}
function esc(s){if(!s)return'';const d=document.createElement('div');d.textContent=s;return d.innerHTML}
function getMod(v){return Math.floor((parseInt(v)-10)/2)}function ms(m){return m>=0?"+"+m:""+m}
function getHp(c){return({Barbarian:14,Wizard:8,Fighter:12,Paladin:12,Pugilist:12})[c]||10}
function getAc(c){return({Barbarian:13,Wizard:11,Monk:13,Pugilist:13})[c]||14}
function scrollN(){setTimeout(()=>{const e=document.getElementById('narr-end');if(e)e.scrollIntoView({behavior:'smooth'})},100)}

async function callDM(msgs,cal){
  const cs=cal?`\n[Date: Day ${cal.day} of ${MONTHS[(cal.month||4)-1].name} (${MONTHS[(cal.month||4)-1].s}). Campaign day ${cal.de||0}. Travel since maintenance: ${cal.dsm||0}.]`:'';
  try{const r=await fetch(PROXY_URL,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1000,system:SYSTEM_PROMPT+cs,messages:msgs.slice(-40)})});
    const d=await r.json();if(d.error)return"⚠ "+d.error.message;return d.content?.map(b=>b.text||"").join("\n")||"The DM pauses...";}catch(e){return"⚠ Connection error."}}
async function joinGame(){const n=S.pn.trim();if(!n)return;LP=n;let g=await fbG('game');
  if(!g)g={players:{},started:false,currentTurn:0,turnOrder:[],host:n,cal:{month:4,day:15,de:0,td:0,dsm:0}};
  if(!g.cal)g.cal={month:4,day:15,de:0,td:0,dsm:0};
  if(Object.keys(g.players||{}).length>=4&&!(g.players||{})[n]){alert("Full");return}
  if(!g.players)g.players={};if(!g.players[n])g.players[n]={joined:true};
  await fbS('game',g);fbL('game',v=>{S.game=v;render()});fbL('narrative',v=>{S.narr=v;render();scrollN()});
  S.phase=g.players[n]?.ch?(g.started?"play":"lobby"):"character";render()}

async function saveChar(){if(!CF.name.trim()){alert("Name required");return}
  const hp=getHp(CF.cls);const ch={cn:CF.name.trim(),race:CF.race,cls:CF.cls,bg:CF.bg,desc:CF.desc,
    str:+CF.str||10,dex:+CF.dex||10,con:+CF.con||10,int:+CF.int||10,wis:+CF.wis||10,cha:+CF.cha||10,
    hp,mhp:hp,ac:getAc(CF.cls),lv:1,gold:0,inv:["Backpack","Waterskin","Rations (3 days)","Bedroll"],
    ssu:{},spells:[],notes:""};
  await fbS(`game/players/${LP}/ch`,ch);S.phase="lobby";render()}

async function startGame(){const g=await fbG('game');const rdy=Object.entries(g.players||{}).filter(([k,v])=>v.ch).map(([k])=>k);
  if(rdy.length<2){alert("Need 2+");return}g.started=true;g.turnOrder=rdy;g.currentTurn=0;await fbS('game',g);
  const cl=rdy.map(p=>{const c=g.players[p].ch;return`${c.cn} (${c.race} ${c.cls}, ${c.bg}, STR${c.str} DEX${c.dex} CON${c.con} INT${c.int} WIS${c.wis} CHA${c.cha}) — player:${p}. ${c.desc||""}`}).join("\n");
  const prompt=`Campaign begins.\nCharacters:\n${cl}\n\nSurvivors of Lochvarn on road south, mid-spring, cold, smoke on horizon. Set opening scene, prompt ${g.players[rdy[0]].ch.cn} to act.`;
  S.loading=true;render();const resp=await callDM([{role:"user",content:prompt}],g.cal);
  const n={entries:[{t:"system",text:"⚔ The campaign begins. ⚔"},{t:"dm",text:resp}],conv:[{role:"user",content:prompt},{role:"assistant",content:resp}]};
  await fbS('narrative',n);S.loading=false;S.phase="play";render()}

async function submitAction(){const a=S.act.trim();if(!a||S.loading)return;const g=await fbG('game');
  const cp=g.turnOrder[g.currentTurn];if(cp!==LP)return;const ch=g.players[cp].ch;
  const nr=await fbG('narrative')||{entries:[],conv:[]};S.act="";
  nr.entries.push({t:"player",player:cp,cn:ch.cn,text:a});
  let dn="";const dm=a.match(/\/roll\s+(\d*)d(\d+)([+-]\d+)?/i);
  if(dm){const c=+dm[1]||1,s=+dm[2],mod=+dm[3]||0;const rolls=Array.from({length:c},()=>Math.floor(Math.random()*s)+1);
    const tot=rolls.reduce((a,b)=>a+b,0)+mod;dn=`\n[🎲 ${c}d${s}${mod>=0?"+":""}${mod}: ${rolls.join(",")} = ${tot}]`;
    nr.entries.push({t:"dice",text:`🎲 ${ch.cn} rolls ${c}d${s}${mod?(mod>0?"+":"")+mod:""}: [${rolls.join(",")}] = ${tot}`})}
  await fbS('narrative',nr);S.loading=true;render();
  const ni=(g.currentTurn+1)%g.turnOrder.length;const nc=g.players[g.turnOrder[ni]].ch.cn;
  const pm=`[${ch.cn} (${ch.race} ${ch.cls}, Lv${ch.lv}, HP${ch.hp}/${ch.mhp}, AC${ch.ac}, STR${ch.str} DEX${ch.dex} CON${ch.con} INT${ch.int} WIS${ch.wis} CHA${ch.cha})]\n${ch.cn}: ${a}${dn}\nResolve, then prompt ${nc}.`;
  const cv=[...(nr.conv||[]),{role:"user",content:pm}];const tr=cv.length>40?cv.slice(-40):cv;
  const resp=await callDM(tr,g.cal);g.currentTurn=ni;await fbS('game/currentTurn',ni);
  nr.entries.push({t:"dm",text:resp});nr.conv=[...tr,{role:"assistant",content:resp}];
  await fbS('narrative',nr);S.loading=false;render()}

async function resetGame(){if(!confirm("Delete entire campaign?"))return;await fbS('game',null);await fbS('narrative',null);
  LP="";S={phase:"join",pn:"",game:null,narr:null,loading:false,act:""};render()}

// CALENDAR
async function calAdv(n){const g=await fbG('game');if(!g?.cal)return;let c=g.cal;
  for(let i=0;i<n;i++){c.day++;if(c.day>DPM){c.day=1;c.month=c.month>=12?1:c.month+1}}
  c.de=(c.de||0)+n;await fbS('game/cal',c);rCal()}
async function calBack(n){const g=await fbG('game');if(!g?.cal)return;let c=g.cal;
  for(let i=0;i<n;i++){c.day--;if(c.day<1){c.day=DPM;c.month=c.month<=1?12:c.month-1}}
  c.de=Math.max(0,(c.de||0)-n);await fbS('game/cal',c);rCal()}
async function calSetDay(d){const g=await fbG('game');if(!g?.cal)return;g.cal.day=d;await fbS('game/cal',g.cal);rCal()}
async function calTravel(n){const g=await fbG('game');if(!g?.cal)return;g.cal.td=(g.cal.td||0)+n;g.cal.dsm=(g.cal.dsm||0)+n;await fbS('game/cal',g.cal);rCal()}
async function calMaint(){const g=await fbG('game');if(!g?.cal)return;g.cal.dsm=0;await fbS('game/cal',g.cal);rCal()}

function rCal(){const g=S.game;if(!g?.cal)return;const c=g.cal;const md=MONTHS[(c.month||4)-1];
  const holy=HOLY.find(h=>h.m===c.month&&h.d===c.day);const w=WX[md.s];const wx=w[(c.month*31+c.day*7)%w.length];
  let h=`<div class="cal-date"><div class="cal-season">${md.i} ${md.s}</div><div class="cal-day">Day ${c.day}</div><div class="cal-month">${md.name}</div><div style="font-size:10px;color:#5a5045;margin-top:4px">${c.de||0} campaign days</div></div>`;
  h+=`<div class="cal-controls"><button class="btn-sm" onclick="calBack(7)">◂Wk</button><button class="btn-sm" onclick="calBack(1)">◂Day</button><button class="btn-sm" onclick="calAdv(1)">Day▸</button><button class="btn-sm" onclick="calAdv(7)">Wk▸</button><button class="btn-sm" onclick="calAdv(30)">Mo▸</button></div>`;
  h+=`<div class="cal-grid">`;for(let i=1;i<=DPM;i++){const td=i===c.day;const dh=HOLY.find(x=>x.m===c.month&&x.d===i);
    h+=`<div class="cal-cell ${td?'today':''}" onclick="calSetDay(${i})" style="background:${td?md.c:dh?dh.cl+'33':'#202030'};color:${td?'#fff':dh?dh.cl:'#777'}">${i}</div>`}h+=`</div>`;
  if(holy)h+=`<div style="background:#2a2a1a;border:1px solid #6a5a3a44;padding:8px;border-radius:6px;margin-bottom:8px;font-size:12px"><div style="color:${holy.cl};font-weight:600">✦ ${holy.name}</div><div style="color:#8a8070;font-size:11px">${holy.g} — ${holy.desc}</div></div>`;
  h+=`<div style="font-size:13px;color:#b0a890;margin-bottom:12px;font-style:italic">Weather: ${wx}</div>`;
  h+=`<div class="sheet-section"><h3>TRAVEL & GEAR</h3><div class="cal-controls"><button class="btn-sm" onclick="calTravel(1)">+1 Travel</button><button class="btn-sm" onclick="calTravel(3)">+3 Travel</button><button class="btn-sm" style="background:#1a2a1a;border-color:#3a5a3a" onclick="calMaint()">✓ Maintenance</button></div>`;
  h+=`<div style="font-size:12px;color:#8a8070;margin-top:8px">Travel: ${c.td||0} total · ${c.dsm||0} since maintenance</div>`;
  if((c.dsm||0)>=5)h+=`<div style="color:#ff8a65;margin-top:4px">⚠ ${c.dsm} days! Gear degrades</div>`;
  else if((c.dsm||0)>=3)h+=`<div style="color:#ffb74d;margin-top:4px">🔧 ${c.dsm}/5 until maintenance</div>`;
  if(c.month>=11||c.month<=2)h+=`<div style="color:#90caf9;margin-top:4px">❄ Winter gear required</div>`;
  h+=`<div style="color:#a5d6a7;margin-top:4px">📅 Market: ${c.day%6===0?'<b>TODAY</b>':`in ${6-(c.day%6)} days`}</div></div>`;
  h+=`<div class="sheet-section"><h3>TRAVEL TIMES</h3><div style="font-size:11px;color:#8a8070;line-height:2"><div>Járnhavn → Vollhaven: 2d</div><div>Vollhaven → Warmsprings: ½d</div><div>Vollhaven → Baile Draighean: 1½d</div><div>B.Draighean → Grove: 3d</div><div>Vollhaven → Lochvarn: 1d</div><div>B.Draighean → Cog's: ½d</div><div>Járnhavn → Coastal Caves: 1d</div><div>Any → God's Reach: 2-3d</div></div></div>`;
  document.getElementById('calBody').innerHTML=h}

// CHARACTER SHEET
async function updateCF(p,f,v){await fbS(`game/players/${p}/ch/${f}`,v)}
async function toggleSlot(p,lv){const g=await fbG('game');const c=g.players[p].ch;if(!c.ssu)c.ssu={};
  const max=(SPELL_SLOTS[c.lv]||{})[lv]||0;c.ssu[lv]=(c.ssu[lv]||0)>=max?0:(c.ssu[lv]||0)+1;
  await fbS(`game/players/${p}/ch/ssu`,c.ssu)}
async function addInv(p){const i=document.getElementById('invIn');if(!i?.value.trim())return;
  const g=await fbG('game');const c=g.players[p].ch;if(!c.inv)c.inv=[];c.inv.push(i.value.trim());
  await fbS(`game/players/${p}/ch/inv`,c.inv);i.value="";rSheet(p)}
async function rmInv(p,idx){const g=await fbG('game');const c=g.players[p].ch;c.inv.splice(idx,1);await fbS(`game/players/${p}/ch/inv`,c.inv);rSheet(p)}
async function addSpell(p){const i=document.getElementById('spIn');if(!i?.value.trim())return;
  const g=await fbG('game');const c=g.players[p].ch;if(!c.spells)c.spells=[];c.spells.push(i.value.trim());
  await fbS(`game/players/${p}/ch/spells`,c.spells);i.value="";rSheet(p)}
async function rmSpell(p,idx){const g=await fbG('game');const c=g.players[p].ch;c.spells.splice(idx,1);await fbS(`game/players/${p}/ch/spells`,c.spells);rSheet(p)}
async function longRest(p){const g=await fbG('game');const c=g.players[p].ch;c.hp=c.mhp;c.ssu={};await fbS(`game/players/${p}/ch`,c);rSheet(p)}
async function saveNotes(p){const t=document.getElementById('chNotes');if(t)await fbS(`game/players/${p}/ch/notes`,t.value)}

function rSheet(p){const g=S.game;if(!g?.players?.[p]?.ch)return;const c=g.players[p].ch;const own=p===LP;
  const hpPct=Math.max(0,Math.min(100,(c.hp/c.mhp)*100));const hpC=c.hp<=c.mhp*.25?'#c87a6a':c.hp<=c.mhp*.5?'#e8a832':'#6aaf6a';
  let h=`<div style="text-align:center;margin-bottom:12px"><div style="font-size:18px;color:#c8a96e;font-weight:700;font-family:Cinzel,serif">${esc(c.cn)}</div><div style="font-size:13px;color:#8a8070">${c.race} ${c.cls} (${c.bg}) · Lv ${c.lv}</div><div style="font-size:11px;color:#6a6050">Player: ${esc(p)}</div></div>`;
  // HP
  h+=`<div class="sheet-section"><h3>HIT POINTS</h3><div style="background:#1e1e30;border-radius:6px;height:24px;margin-bottom:6px;overflow:hidden"><div style="background:${hpC};height:100%;width:${hpPct}%;border-radius:6px"></div></div>`;
  h+=`<div style="display:flex;justify-content:center;align-items:center;gap:8px">${own?`<button class="btn-sm" onclick="updateCF('${p}','hp',Math.max(0,${c.hp}-1))">−</button>`:''}<span style="font-size:20px;font-weight:700;color:${hpC}">${c.hp}/${c.mhp}</span>${own?`<button class="btn-sm" onclick="updateCF('${p}','hp',Math.min(${c.mhp},${c.hp}+1))">+</button>`:''}</div>`;
  h+=`<div style="text-align:center;font-size:12px;color:#8a8070;margin-top:4px">AC ${c.ac}</div>`;
  if(own)h+=`<div style="text-align:center;margin-top:8px"><button class="btn-sm" style="background:#1a2a1a;border-color:#3a5a3a" onclick="longRest('${p}')">🌙 Long Rest</button></div>`;
  h+=`</div>`;
  // Stats
  h+=`<div class="sheet-section"><h3>ABILITY SCORES</h3><div style="display:grid;grid-template-columns:repeat(3,1fr);gap:6px;text-align:center">`;
  ['str','dex','con','int','wis','cha'].forEach(s=>{const v=c[s]||10;h+=`<div style="background:#1e1e30;border-radius:6px;padding:6px"><div style="font-size:10px;color:#8a8070;letter-spacing:1px">${s.toUpperCase()}</div><div style="font-size:18px;color:#d4cbb8;font-weight:700">${v}</div><div style="font-size:12px;color:#c8a96e">${ms(getMod(v))}</div></div>`});
  h+=`</div></div>`;
  // Gold
  h+=`<div class="sheet-section"><h3>GOLD</h3><div style="display:flex;justify-content:center;align-items:center;gap:8px">${own?`<button class="btn-sm" onclick="updateCF('${p}','gold',Math.max(0,${c.gold||0}-1))">−</button>`:''}<span style="font-size:20px;font-weight:700;color:#e8c832">${c.gold||0} gp</span>${own?`<button class="btn-sm" onclick="updateCF('${p}','gold',${(c.gold||0)+1})">+</button>`:''}</div></div>`;
  // Spell Slots
  if(c.lv>=2&&CASTER_CLASSES.includes(c.cls)){const slots=SPELL_SLOTS[Math.min(c.lv,9)]||{};
    h+=`<div class="sheet-section"><h3>SPELL SLOTS</h3>`;
    for(let lv=1;lv<=5;lv++){const mx=slots[lv];if(!mx)continue;const used=(c.ssu||{})[lv]||0;
      h+=`<div class="sheet-row"><span class="lbl">Level ${lv}</span><span>`;
      for(let i=0;i<mx;i++)h+=`<span class="slot-pip ${i<used?'used':'available'}" onclick="${own?`toggleSlot('${p}',${lv})`:''}"></span>`;
      h+=`</span></div>`}h+=`</div>`}
  // Spells
  h+=`<div class="sheet-section"><h3>SPELLS</h3>`;
  (c.spells||[]).forEach((s,i)=>{h+=`<div class="inv-item"><span>${esc(s)}</span>${own?`<span class="del" onclick="rmSpell('${p}',${i})">✕</span>`:''}</div>`});
  if(own)h+=`<div class="inv-add"><input type="text" id="spIn" placeholder="Add spell..." onkeydown="if(event.key==='Enter')addSpell('${p}')"><button class="btn-sm" onclick="addSpell('${p}')">+</button></div>`;
  if(!(c.spells||[]).length&&!own)h+=`<div style="font-size:12px;color:#5a5045">None</div>`;h+=`</div>`;
  // Inventory
  h+=`<div class="sheet-section"><h3>INVENTORY</h3>`;
  (c.inv||[]).forEach((item,i)=>{h+=`<div class="inv-item"><span>${esc(item)}</span>${own?`<span class="del" onclick="rmInv('${p}',${i})">✕</span>`:''}</div>`});
  if(own)h+=`<div class="inv-add"><input type="text" id="invIn" placeholder="Add item..." onkeydown="if(event.key==='Enter')addInv('${p}')"><button class="btn-sm" onclick="addInv('${p}')">+</button></div>`;
  h+=`</div>`;
  // Notes
  if(own)h+=`<div class="sheet-section"><h3>NOTES</h3><textarea id="chNotes" style="width:100%;min-height:80px;font-size:13px" onblur="saveNotes('${p}')">${esc(c.notes||'')}</textarea></div>`;
  if(c.desc)h+=`<div class="sheet-section"><h3>DESCRIPTION</h3><div style="font-size:13px;color:#7a7060;font-style:italic">${esc(c.desc)}</div></div>`;
  document.getElementById('sheetBody').innerHTML=h}

function openCal(){closeAll();document.getElementById('calPanel').classList.add('open');document.getElementById('overlay').classList.add('open');rCal()}
function openSheet(p){closeAll();document.getElementById('sheetPanel').classList.add('open');document.getElementById('overlay').classList.add('open');rSheet(p)}
function closeAll(){document.getElementById('calPanel').classList.remove('open');document.getElementById('sheetPanel').classList.remove('open');document.getElementById('overlay').classList.remove('open')}
function render(){const app=document.getElementById('app');const g=S.game;

if(S.phase==="join"){app.innerHTML=`<div class="header"><h1 class="title">AETHELGARD</h1><div class="sub">STORM OF THE DRAGON</div></div><div class="center"><div class="panel"><div style="text-align:center;margin-bottom:16px"><div style="font-size:16px;color:#c8a96e;font-weight:600;font-family:Cinzel,serif">⚔ Join Campaign ⚔</div></div><label>Your Name</label><input type="text" id="nameIn" placeholder="e.g. Nathan" onkeydown="if(event.key==='Enter'){S.pn=this.value;joinGame()}"><div style="text-align:center"><button class="btn" onclick="S.pn=document.getElementById('nameIn').value;joinGame()">Enter</button></div></div></div>`;return}

if(S.phase==="character"){app.innerHTML=`<div class="header"><h1 class="title">AETHELGARD</h1><div class="sub">CREATE YOUR CHARACTER</div></div><div class="center"><div class="panel" style="max-width:480px"><div style="text-align:center;font-size:12px;color:#6a6050;margin-bottom:8px">You survived Lochvarn. Who are you?</div><label>Character Name</label><input type="text" id="cN" value="${CF.name}" placeholder="e.g. Mörka"><label>Race</label><select id="cR">${RACES.map(r=>`<option ${r===CF.race?'selected':''}>${r}</option>`).join('')}</select><label>Class</label><select id="cC">${CLASSES.map(c=>`<option ${c===CF.cls?'selected':''}>${c}</option>`).join('')}</select><label>Background</label><select id="cB">${BACKGROUNDS.map(b=>`<option ${b===CF.bg?'selected':''}>${b}</option>`).join('')}</select><label>Ability Scores</label><div style="display:grid;grid-template-columns:repeat(3,1fr);gap:6px">${['str','dex','con','int','wis','cha'].map(s=>`<div><div style="font-size:10px;color:#8a8070;text-align:center;letter-spacing:1px">${s.toUpperCase()}</div><input type="number" id="c_${s}" value="${CF[s]}" min="1" max="20" style="text-align:center;font-size:16px"></div>`).join('')}</div><label>Description</label><textarea id="cD" placeholder="Appearance, personality, backstory, gear...">${CF.desc}</textarea><div style="text-align:center"><button class="btn" onclick="CF.name=document.getElementById('cN').value;CF.race=document.getElementById('cR').value;CF.cls=document.getElementById('cC').value;CF.bg=document.getElementById('cB').value;CF.desc=document.getElementById('cD').value;['str','dex','con','int','wis','cha'].forEach(s=>CF[s]=document.getElementById('c_'+s).value);saveChar()">Create Character</button></div></div></div>`;return}

if(S.phase==="lobby"){const ps=g?.players?Object.entries(g.players):[];const rdy=ps.filter(([k,v])=>v.ch);const isH=g?.host===LP;
  app.innerHTML=`<div class="header"><h1 class="title">AETHELGARD</h1><div class="sub">WAITING FOR PARTY</div></div><div class="center"><div class="panel"><div style="text-align:center;margin-bottom:12px"><div style="font-size:15px;color:#c8a96e;font-weight:600;font-family:Cinzel,serif">The Party Gathers...</div><div style="font-size:12px;color:#6a6050;margin-top:4px">Share this URL with friends</div></div>${ps.map(([p,v])=>{const c=v.ch;return`<div class="char-card">${c?`<div class="char-name">${esc(c.cn)}</div><div class="char-info">${c.race} ${c.cls} (${c.bg})</div><div class="char-info">STR${c.str} DEX${c.dex} CON${c.con} INT${c.int} WIS${c.wis} CHA${c.cha}</div><div class="char-info">Player: ${esc(p)} ${p===g.host?'👑':''}</div>${c.desc?`<div class="char-desc">${esc(c.desc)}</div>`:''}`:`<div style="color:#6a6050;font-size:13px">${esc(p)} — creating character...</div>`}</div>`}).join('')}<div style="text-align:center;margin-top:12px;font-size:12px;color:#6a6050">${rdy.length}/${ps.length} ready</div>${isH&&rdy.length>=2?`<div style="text-align:center"><button class="btn" onclick="startGame()">⚔ Begin Campaign ⚔</button></div>`:''}${isH&&rdy.length<2?`<div style="text-align:center;margin-top:12px;font-size:12px;color:#8a6050">Need 2+ players</div>`:''}${!isH?`<div style="text-align:center;margin-top:12px;font-size:12px;color:#6a6050">Waiting for ${esc(g?.host)}...</div>`:''}
  <div style="text-align:center;margin-top:16px"><button class="btn-sm btn-danger" onclick="resetGame()">Reset</button></div></div></div>`;
  if(g?.started){S.phase="play";render()}return}

if(S.phase==="play"){if(!g)return;const ps=g.players||{};const to=g.turnOrder||[];
  const ctp=to[g.currentTurn||0];const ctc=ps[ctp]?.ch;const imt=ctp===LP;const mc=ps[LP]?.ch;
  const entries=S.narr?.entries||[];const cal=g.cal||{month:4,day:15};const md=MONTHS[(cal.month||4)-1];
  app.innerHTML=`<div class="game-wrap"><div class="game-header"><div><div class="title" style="font-size:16px;letter-spacing:2px">AETHELGARD</div></div><div style="text-align:right;font-size:11px;color:#8a8070">${md.i} Day ${cal.day}, ${md.name}</div></div>
  <div class="toolbar"><button class="toolbar-btn" onclick="openCal()">📅 Calendar</button><button class="toolbar-btn" onclick="openSheet('${LP}')">📋 My Sheet</button>${to.map(p=>{const ch=ps[p]?.ch;return p!==LP?`<button class="toolbar-btn" onclick="openSheet('${p}')">${esc(ch?.cn||p)}</button>`:''}).join('')}<button class="toolbar-btn btn-danger" style="margin-left:auto" onclick="resetGame()">Reset</button></div>
  <div class="turn-banner" style="background:${imt?'#1a2a1a':'#1a1a2e'};color:${imt?'#6aaf6a':'#c8a96e'};border-bottom:2px solid ${imt?'#6aaf6a':'#c8a96e'}">${S.loading?'⏳ The DM weaves the tale...':imt?`⚔ YOUR TURN — ${esc(mc?.cn||'')}`:`⏳ ${esc(ctc?.cn||'...')}'s turn`}</div>
  <div class="party-strip">${to.map((p,i)=>{const ch=ps[p]?.ch;const cur=i===(g.currentTurn||0);const hp=ch?Math.round(ch.hp/ch.mhp*100):100;const hc=hp<=25?'#c87a6a':hp<=50?'#e8a832':'#6aaf6a';return`<div class="party-member" onclick="openSheet('${p}')" style="background:${cur?'#2a3a2a':'#1a1a28'};border:1px solid ${cur?'#6aaf6a55':'#2a2a3e'}"><div style="font-size:11px;font-weight:600;color:${cur?'#6aaf6a':'#8a8070'}">${esc(ch?.cn||p)} ${cur?'◆':''}</div><div style="font-size:9px;color:${hc}">HP ${ch?.hp||'?'}/${ch?.mhp||'?'}</div></div>`}).join('')}</div>
  <div class="narrative" id="narrative">${entries.map(e=>{if(e.t==='system')return`<div class="msg-system">${esc(e.text)}</div>`;if(e.t==='dice')return`<div class="msg-dice">${esc(e.text)}</div>`;if(e.t==='dm')return`<div class="msg-dm">${esc(e.text)}</div>`;if(e.t==='player')return`<div><div class="player-tag">⚔ ${esc(e.cn)} (${esc(e.player)})</div><div class="msg-player">${esc(e.text)}</div></div>`;return''}).join('')}${S.loading?'<div class="msg-system" style="font-size:12px;color:#6a6050">⏳ The DM is writing...</div>':''}<div id="narr-end"></div></div>
  <div class="input-bar"><input type="text" id="actionIn" value="${esc(S.act)}" placeholder="${imt?'What does '+(mc?.cn||'')+' do?':'Waiting for '+(ctc?.cn||'...')}" ${!imt||S.loading?'disabled':''} onkeydown="if(event.key==='Enter'){S.act=this.value;submitAction()}"><button class="btn-sm" style="padding:10px 16px;opacity:${imt&&!S.loading?1:0.4}" onclick="S.act=document.getElementById('actionIn').value;submitAction()" ${!imt||S.loading?'disabled':''}>▸</button></div>
  <div class="footer-bar"><span>Type /roll 1d20+3 for dice</span><span>${md.i} ${md.name}, Day ${cal.day}</span></div></div>`;
  scrollN();if(imt&&!S.loading){const inp=document.getElementById('actionIn');if(inp)inp.focus()}}}
render();
</script></body></html>
