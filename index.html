const firebaseConfig={apiKey:"AIzaSyD7rwt_Wm6tZ_nVTaK94M1R0Ppsed8CpiU",authDomain:"aethelgard-f0828.firebaseapp.com",databaseURL:"https://aethelgard-f0828-default-rtdb.firebaseio.com",projectId:"aethelgard-f0828",storageBucket:"aethelgard-f0828.firebasestorage.app",messagingSenderId:"501726848128",appId:"1:501726848128:web:adae851f62445d3c36b265"};
const PROXY_URL="https://aethelgard-proxy.nathan13mcclelland.workers.dev";
const SYSTEM_PROMPT=`You are the Dungeon Master for "Aethelgard: Storm of the Dragon," a D&D 5e campaign on a Norse-inspired island. Grimdark-but-grounded, theater of the mind. NPCs are real people with opinions.

TONE — THIS IS AN ADULT GAME (18+):
- Write with vivid, visceral detail. Describe the crack of bone, the stench of rot, the wet sound of a blade entering flesh. Do not sanitize violence.
- Gore and injury should be described honestly. When a character takes an axe to the shoulder, describe the wound — torn muscle, exposed bone, blood soaking through leather.
- NPCs swear, threaten, beg, and betray. They are desperate people in a desperate world. They lie. They steal. Some are cruel. Some are broken.
- Death is ugly. Describe dying enemies choking, crawling, pleading. Describe dead bodies frozen in the snow, bloated corpses in the ruins, the smell of battlefields.
- The world is harsh. Hunger gnaws. Cold kills. Disease spreads. People suffer and the gods are silent.
- Emotional scenes should hit hard. Grief, rage, betrayal, loss — lean into these. Make the players feel the weight of what's happening.
- Horror is welcome. The fey are alien and wrong. The undead are grotesque. The dragon is a force of nature that makes mortals feel like insects. Describe dread, unease, wrongness.
- Addiction, corruption, madness, moral compromise — these are themes in this world. The Ormhjarta corrupts. Power has a price.
- Do NOT censor or soften the world. If a village was slaughtered, describe what the party finds. If an NPC is tortured, don't fade to black.
- That said, keep it tasteful — graphic violence and dark themes yes, but maintain literary quality. Think Joe Abercrombie, George R.R. Martin, The Witcher. Brutal but well-written.
WORLD: Aethelgard, remote island, ~5000 people, Norse culture. Gods: Thunraz (storms), Hælfesta (hearth), Siglvætr (sea). Druids worship Silvanus.
LOCATIONS: Járnhavn (iron capital, north). Vollhaven (central crossroads). Warmsprings (hot springs, south of Vollhaven). Baile Draighean (southern frontier, goblin raids). Grandmother's Wood (fey forest, NW interior). Grove of Gwynneth (druid sanctuary, south peninsula). Lochvarn (destroyed by a catastrophic storm, east Mirror Lake). Skógheim (lumber village). Coastal Caves (west coast). Chapel of Quiet Rest (north foothills). God's Reach (western mountains, perpetual storms at peak).

WHAT EVERYONE ON THE ISLAND KNOWS:
- Lochvarn was destroyed by a terrible storm — unnatural, violent, like nothing in living memory
- Refugees are flooding south toward Vollhaven
- The Jarl's Council in Járnhavn is struggling to maintain order
- Goblin raids plague Baile Draighean and the southern settlements
- The Shadow Market operates in Járnhavn's underbelly — smugglers, fences, information brokers
- Grandmother's Wood is dangerous and fey-haunted — most people avoid it
- Strange weather has been increasing across the island
- Elara Meadowlight's father Aldric went missing 2 years ago — she still searches for answers

KEY NPCs: Elara Meadowlight (innkeeper Vollhaven, warm but grieving). Anya Stonehand (dwarf commander, Járnhavn, blunt and principled). Zephyr (tiefling, Shadow Market lieutenant, pragmatic). Cog Thornwrench (goblin artificer, NE of Baile Draighean, brilliant and rude). Sigurd (archivist, Járnhavn, obsessive scholar). Grandmother Moira (archdruid, Grove of Gwynneth). Father Kaelen (priest, Chapel of Quiet Rest, gentle and devoted). Brick Hagen (half-orc pugilist, Járnhavn). Thordak Ironbrow (master smith, Járnhavn).

SECRET LORE — DO NOT REVEAL UNLESS PLAYERS DISCOVER IT THROUGH GAMEPLAY:
- The storm that destroyed Lochvarn was actually a dragon attack by Ushathen, an ancient blue dragon nesting at the peaks of God's Reach. NOBODY knows this yet. There is no dragon cult. There are no dragon worshippers. Nobody on the island knows the dragon exists.
- Valerius is a lich enslaved by the Ormhjarta artifact, trapped in the Ruined City (Kohr'borg) hidden by illusion on Mirror Lake's west shore. 
- Father Kaelen unknowingly channels Valerius's power, not the dead god Nergal.
- The Ormhjarta is a crystalline artifact hidden in Seálad Thair (a pocket dimension at God's Reach base).
- Stone circles (Fainne Sithe) are a teleportation network built by the extinct Vethren.
- The quest to find these secrets goes: Aldric's journal → Cog Thornwrench → Seer's Lens (6 components) → Seálad Thair → Ormhjarta → eventually confront Ushathen.
- This is a SLOW BURN. The dragon is an endgame threat revealed over many sessions. Early sessions should focus on survival, reaching Vollhaven, the goblin problem, the Jarl vs Shadow Market tension, and natural dangers.

CAMPAIGN PACING — CRITICAL:
- DO NOT invent cults, dragon servants, dark acolytes, or any organization serving the dragon. None exist.
- DO NOT reveal the dragon's existence early. The party should piece it together over time through clues — unnatural storms, scorched earth patterns, ancient texts, NPC rumors that don't quite add up.
- Early encounters should be: bandits, desperate refugees, wild animals (wolves, bears), goblins, harsh weather, starvation, the fey, undead near the Chapel. Mundane and natural threats.
- The world's dangers are ORDINARY at first — cold, hunger, hostile people, wild beasts. The supernatural horror creeps in slowly.
- Let the players DISCOVER the plot. Don't hand them a quest marker pointing at the dragon. Let them follow Aldric's trail, hear rumors, find odd clues, and gradually realize something far worse than a storm destroyed their home.
DM RULES — FOLLOW THE D&D 5e RULES STRICTLY:
- Roll dice [d20+mod = result vs DC X]. Under 300 words unless major scene. NPCs have personality. Ask "What do you do?"
- You are running a RULES-ACCURATE 5e game. Consult the 5e SRD for all rulings.

5e MECHANICS TO ENFORCE:
- Action economy: each character gets 1 action, 1 bonus action, 1 reaction, and movement per turn. No extra attacks unless class features grant them (e.g. Fighter Extra Attack at level 5).
- Spell slots are LIMITED. Track them. When a caster uses a spell, mark it with [SPELL:CharName:SlotLevel] (e.g. [SPELL:Math-achu:1] uses a level 1 slot). If they have no slots left, the spell FAILS — tell them they're out.
- Cantrips are free and unlimited. Leveled spells cost slots. Know the difference.
- Spell components matter. If a spell requires material components worth gold, the caster needs them.
- Concentration: only one concentration spell at a time. Taking damage forces a CON save (DC 10 or half damage, whichever is higher) or the spell drops.
- Short rest: spend hit dice to heal, recover some class features (Warlock slots, Fighter Second Wind, etc.)
- Long rest: restore ALL HP, restore ALL spell slots, reset hit dice (half level, minimum 1). Requires 8 hours in a safe location.
- Opportunity attacks: moving out of an enemy's reach without Disengaging provokes an attack.
- Cover: half cover = +2 AC, three-quarters = +5 AC.
- Advantage/disadvantage: roll 2d20, take higher/lower. Don't stack — one instance is enough.
- Death saves: at 0 HP, roll d20 each turn. 10+ = success, 9- = failure. Three failures = death. Three successes = stable at 0 HP. Natural 20 = regain 1 HP. Natural 1 = two failures.
- Exhaustion levels stack and are brutal. Track them.
- Proficiency bonus by level: Lv1-4 = +2, Lv5-8 = +3, Lv9-12 = +4.
- Saving throws: each class is proficient in two saves. Apply proficiency bonus to those.
- Skill checks use ability mod + proficiency (if proficient). Don't let players roll for things that should be automatic or impossible.
- RACIAL TRAITS MATTER. Enforce them: Dwarves have poison resistance and darkvision. Elves can't be put to sleep and have darkvision. Half-Orcs drop to 1 HP instead of 0 once per long rest (Relentless Endurance). Goliaths can reduce damage with Stone's Endurance. Goblins can Disengage or Hide as a bonus action (Nimble Escape). Firbolgs can turn invisible (Hidden Step). Halflings reroll natural 1s on attacks/saves/checks (Lucky). Tieflings have fire resistance. Aasimar have healing hands and celestial resistance. Always apply the character's racial abilities when relevant.

SURVIVAL — THE WORLD WILL KILL YOU IF YOU DON'T RESPECT IT:
- Track food and water. Each character needs 1 lb food and 1 gallon water per day. In winter or hot weather, double water.
- If a character hasn't eaten in a day, note it. After 3 days without food: [CONDITION:CharName:Starving] and 1 level of exhaustion per day after. After 1 day without water in harsh conditions: exhaustion stacks fast.
- Use [TAKE] to consume rations when characters eat. If they have no food, they don't eat — describe the hunger gnawing at them.
- Foraging requires a Survival check. DC 10 in forest, DC 14 on plains, DC 16 in mountains, +5 in winter. Foraging takes time — it's not free.
- Hunting takes even longer. Tracking, stalking, killing, butchering. A successful hunt might feed the party for days, but it takes hours and makes noise.
- Sleep deprivation causes exhaustion. No safe place to sleep = no long rest. Sleeping in the open in winter without shelter = CON save DC 12 or gain exhaustion.
- Hypothermia is real. Extended cold exposure without proper gear: CON saves every hour, escalating DC. Failure = exhaustion stacking toward death.
- Exhaustion is the silent killer. Level 1: disadvantage on ability checks. Level 2: speed halved. Level 3: disadvantage on attacks and saves. Level 4: HP max halved. Level 5: speed 0. Level 6: DEATH.

THE LIVING WORLD — THINGS HAPPEN WHETHER THE PLAYERS CAUSE THEM OR NOT:
- The environment reacts to the party. Butchering a deer attracts wolves. Camping near water draws predators at night. A fire in the dark draws attention — friendly or hostile.
- Random encounters are real. When traveling or camping, roll for encounters. Not every stretch of road is safe. Bandits, wild animals, patrols, refugees, merchants, storms.
- Animals behave like animals. Wolves circle, test for weakness, attack the smallest or wounded. Bears charge when surprised. Deer bolt. Crows follow death.
- Weather changes. Storms roll in mid-travel. Fog obscures the path. Rain turns roads to mud and slows travel. Blizzards can be lethal.
- NPCs have schedules and lives. Shops close. People sleep. The blacksmith is drunk some days. The inn might be full. The road might be washed out.
- Night is dangerous. Traveling after dark without light = disadvantage on Perception, risk of ambush, risk of getting lost. Most people don't travel at night for good reason.
- Sound carries. Combat, shouting, chopping wood — these attract things. The wilderness is listening.
- Describe the environment constantly: the cold, the smell, the sounds, the light. Make the players FEEL where they are. Wet boots, numb fingers, the distant howl of something, smoke on the horizon, the taste of ash in the air.
- Enemies FIGHT BACK. Every hostile creature attacks on its turn. Roll their attacks against player AC. If the attack hits, roll damage and apply it with [HP:CharName:-X].
- Use real D&D 5e stat blocks. A wolf has +4 to hit and deals 2d4+2 damage. A bandit has +3 to hit, 1d6+1 damage. A goblin has +4 to hit, 1d6+2 damage. Don't invent weak enemies.
- Show enemy attack rolls: "The wolf lunges at Math-achu [d20+4 = 17 vs AC 15 — HIT! 2d4+2 = 7 damage]"
- Enemies act INTELLIGENTLY. They flank, target wounded characters, use cover, retreat when losing.
- Multiple enemies attack in the same round. 3 wolves means 3 attack rolls against potentially different targets.
- Death is real. Characters can go to 0 HP and start death saves. Don't pull punches.
- The world is grimdark. Combat should feel desperate and dangerous, not heroic. Level 1 characters can die to wolves.
- Environmental hazards deal damage: falling, fire, cold exposure, drowning. Use [HP] tags.
- Failed saving throws have real consequences: poison deals ongoing damage, traps deal damage, falls break bones.
- Do NOT skip enemy turns. Do NOT narrate combat as "you easily defeat them." Every fight should cost something — HP, supplies, time.
- After combat, enemies might have loot. Use [GIVE] for anything the players search for and find.
- Healing is scarce. Potions are rare. Rest requires safety. The party should feel resource pressure.

INVENTORY & GAME STATE TAGS — USE THESE whenever items, gold, HP, or conditions change:
- [GIVE:CharacterName:Item Name] — when a character finds, picks up, buys, or receives an item
- [TAKE:CharacterName:Item Name] — when a character uses, drops, sells, loses, or breaks an item
- [TRANSFER:FromCharacter:ToCharacter:Item Name] — when one character gives an item to another
- [GOLD:CharacterName:+5] or [GOLD:CharacterName:-3] — when gold is gained or spent
- [HP:CharacterName:-5] or [HP:CharacterName:+3] — when HP changes from damage, healing, etc.
- [CONDITION:CharacterName:Poisoned] — when a condition is applied (Poisoned, Exhausted, Frightened, etc.)
- [CLEAR:CharacterName:Poisoned] — when a condition is removed
- [XP:CharacterName:+25] — when XP is earned
- [SPELL:CharacterName:1] — when a leveled spell is cast (number = slot level used). ALWAYS use this when a caster uses a spell slot. If they have no slots remaining, tell them the spell fizzles and they're out of power.
- [LONGREST:CharacterName] — when completing a long rest (restores HP and all spell slots, removes one exhaustion level). Requires 8 hours in a SAFE location. Deny long rests in dangerous areas.
- [SHORTREST:CharacterName] — when completing a short rest (1 hour, spend hit dice, Warlock slots recover)
- [DISCOVER:location_id] — when the party arrives at a new location

IMPORTANT: Always use the CHARACTER NAME (e.g. Math-achu, not the player name Nathan). Place tags at the END of your response, after the narrative. Use [GIVE] whenever a character picks something up or receives something — the player's inventory updates automatically. Use [TAKE] when they use a consumable, give something away, or lose an item. Players CANNOT add items manually — you control all inventory through these tags.

The current campaign date will be provided with each message. Reference seasons and weather naturally.`;

async function processGameTags(text,game){
  if(!game?.players)return[];
  const notifications=[];
  const players=game.players;
  // Helper: find player key by character name
  function findPlayer(cn){for(const[k,v]of Object.entries(players)){if(v.ch&&v.ch.cn.toLowerCase()===cn.toLowerCase())return k}return null}
  
  // [GIVE:CharName:Item]
  const giveRe=/\[GIVE:([^:]+):([^\]]+)\]/g;let m;
  while((m=giveRe.exec(text))!==null){const pk=findPlayer(m[1].trim());if(!pk)continue;
    const item=m[2].trim();const ch=players[pk].ch;if(!ch.inv)ch.inv=[];ch.inv.push(item);
    await fbS(`game/players/${pk}/ch/inv`,ch.inv);notifications.push({t:"inv",text:`📦 ${esc(ch.cn)} received ${esc(item)}`})}
  
  // [TAKE:CharName:Item]
  const takeRe=/\[TAKE:([^:]+):([^\]]+)\]/g;
  while((m=takeRe.exec(text))!==null){const pk=findPlayer(m[1].trim());if(!pk)continue;
    const item=m[2].trim().toLowerCase();const ch=players[pk].ch;if(!ch.inv)continue;
    const idx=ch.inv.findIndex(i=>i.toLowerCase()===item||i.toLowerCase().includes(item));
    if(idx>=0){const removed=ch.inv.splice(idx,1)[0];await fbS(`game/players/${pk}/ch/inv`,ch.inv);
      notifications.push({t:"inv",text:`📤 ${esc(ch.cn)} lost ${esc(removed)}`})}}
  
  // [TRANSFER:From:To:Item]
  const transRe=/\[TRANSFER:([^:]+):([^:]+):([^\]]+)\]/g;
  while((m=transRe.exec(text))!==null){const fk=findPlayer(m[1].trim()),tk=findPlayer(m[2].trim());if(!fk||!tk)continue;
    const item=m[3].trim().toLowerCase();const fc=players[fk].ch,tc=players[tk].ch;
    if(!fc.inv)continue;const idx=fc.inv.findIndex(i=>i.toLowerCase()===item||i.toLowerCase().includes(item));
    if(idx>=0){const moved=fc.inv.splice(idx,1)[0];if(!tc.inv)tc.inv=[];tc.inv.push(moved);
      await fbS(`game/players/${fk}/ch/inv`,fc.inv);await fbS(`game/players/${tk}/ch/inv`,tc.inv);
      notifications.push({t:"inv",text:`🔄 ${esc(fc.cn)} gave ${esc(moved)} to ${esc(tc.cn)}`})}}
  
  // [GOLD:CharName:+/-N]
  const goldRe=/\[GOLD:([^:]+):([+-]?\d+)\]/g;
  while((m=goldRe.exec(text))!==null){const pk=findPlayer(m[1].trim());if(!pk)continue;
    const amt=parseInt(m[2]);const ch=players[pk].ch;ch.gold=Math.max(0,(ch.gold||0)+amt);
    await fbS(`game/players/${pk}/ch/gold`,ch.gold);
    notifications.push({t:"inv",text:`${amt>0?'💰':'💸'} ${esc(ch.cn)} ${amt>0?'gained':'lost'} ${Math.abs(amt)} gold (${ch.gold} total)`})}
  
  // [HP:CharName:+/-N]
  const hpRe=/\[HP:([^:]+):([+-]?\d+)\]/g;
  while((m=hpRe.exec(text))!==null){const pk=findPlayer(m[1].trim());if(!pk)continue;
    const amt=parseInt(m[2]);const ch=players[pk].ch;ch.hp=Math.max(0,Math.min(ch.mhp,ch.hp+amt));
    await fbS(`game/players/${pk}/ch/hp`,ch.hp);
    notifications.push({t:"inv",text:`${amt>0?'💚':'💔'} ${esc(ch.cn)} ${amt>0?'healed':'took'} ${Math.abs(amt)} HP (${ch.hp}/${ch.mhp})`})}
  
  // [CONDITION:CharName:Condition]
  const condRe=/\[CONDITION:([^:]+):([^\]]+)\]/g;
  while((m=condRe.exec(text))!==null){const pk=findPlayer(m[1].trim());if(!pk)continue;
    const cond=m[2].trim();const ch=players[pk].ch;if(!ch.conditions)ch.conditions=[];
    if(!ch.conditions.includes(cond)){ch.conditions.push(cond);await fbS(`game/players/${pk}/ch/conditions`,ch.conditions);
      notifications.push({t:"inv",text:`⚠ ${esc(ch.cn)} is now ${esc(cond)}`})}}
  
  // [CLEAR:CharName:Condition]
  const clearRe=/\[CLEAR:([^:]+):([^\]]+)\]/g;
  while((m=clearRe.exec(text))!==null){const pk=findPlayer(m[1].trim());if(!pk)continue;
    const cond=m[2].trim();const ch=players[pk].ch;if(!ch.conditions)continue;
    const ci=ch.conditions.indexOf(cond);if(ci>=0){ch.conditions.splice(ci,1);
      await fbS(`game/players/${pk}/ch/conditions`,ch.conditions);
      notifications.push({t:"inv",text:`✅ ${esc(ch.cn)} is no longer ${esc(cond)}`})}}
  
  // [XP:CharName:+N]
  const xpRe=/\[XP:([^:]+):([+-]?\d+)\]/g;
  while((m=xpRe.exec(text))!==null){const pk=findPlayer(m[1].trim());if(!pk)continue;
    const amt=parseInt(m[2]);const ch=players[pk].ch;ch.xp=(ch.xp||0)+amt;
    await fbS(`game/players/${pk}/ch/xp`,ch.xp);
    notifications.push({t:"inv",text:`⭐ ${esc(ch.cn)} gained ${amt} XP (${ch.xp} total)`})}
  
  // [SPELL:CharName:SlotLevel] — expend a spell slot
  const spellRe=/\[SPELL:([^:]+):(\d+)\]/g;
  while((m=spellRe.exec(text))!==null){const pk=findPlayer(m[1].trim());if(!pk)continue;
    const slotLv=parseInt(m[2]);const ch=players[pk].ch;
    if(!ch.ssu)ch.ssu={};const max=(SPELL_SLOTS[Math.min(ch.lv||1,9)]||{})[slotLv]||0;
    const used=(ch.ssu[slotLv]||0);
    if(used<max){ch.ssu[slotLv]=used+1;await fbS(`game/players/${pk}/ch/ssu`,ch.ssu);
      notifications.push({t:"inv",text:`🔮 ${esc(ch.cn)} used a level ${slotLv} spell slot (${ch.ssu[slotLv]}/${max} used)`})}
    else{notifications.push({t:"inv",text:`⛔ ${esc(ch.cn)} has no level ${slotLv} slots remaining!`})}}
  
  // [LONGREST:CharName] — full rest, restore HP and all spell slots
  const lrRe=/\[LONGREST:([^\]]+)\]/g;
  while((m=lrRe.exec(text))!==null){const pk=findPlayer(m[1].trim());if(!pk)continue;
    const ch=players[pk].ch;ch.hp=ch.mhp;ch.ssu={};
    // Remove exhaustion by 1 level if tracked
    if(ch.conditions){const exIdx=ch.conditions.findIndex(c=>c.toLowerCase().includes('exhaust'));
      if(exIdx>=0)ch.conditions.splice(exIdx,1)}
    await fbS(`game/players/${pk}/ch`,ch);
    notifications.push({t:"inv",text:`🌙 ${esc(ch.cn)} completed a long rest — HP and spell slots restored`})}
  
  // [SHORTREST:CharName] — short rest
  const srRe=/\[SHORTREST:([^\]]+)\]/g;
  while((m=srRe.exec(text))!==null){const pk=findPlayer(m[1].trim());if(!pk)continue;
    const ch=players[pk].ch;
    // Warlocks recover slots on short rest
    if(ch.cls==='Warlock'){ch.ssu={};await fbS(`game/players/${pk}/ch/ssu`,ch.ssu)}
    notifications.push({t:"inv",text:`☕ ${esc(ch.cn)} completed a short rest`})}
  
  // Discovers
  processDiscovers(text);
  return notifications;
}

async function callDM(msgs,cal){
  const cs=cal?`\n[Date: Day ${cal.day} of ${MONTHS[(cal.month||4)-1].name} (${MONTHS[(cal.month||4)-1].s}). Campaign day ${cal.de||0}.]`:'';
  try{const r=await fetch(PROXY_URL,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1000,system:SYSTEM_PROMPT+cs,messages:msgs.slice(-40)})});
    const d=await r.json();if(d.error)return"⚠ "+d.error.message;return d.content?.map(b=>b.text||"").join("\n")||"The DM pauses...";}catch(e){return"⚠ Connection error."}}

async function submitAction(){const a=S.act.trim();if(!a||S.loading)return;const g=await fbG('game');
  const to=g.turnOrder||[];const cp=to[g.currentTurn||0];
  if(g.mode!=='solo'&&cp!==LP)return;
  const ch=g.players[cp||LP]?.ch||g.players[LP]?.ch;if(!ch)return;
  const nr=await fbG('narrative')||{entries:[],conv:[]};S.act="";
  nr.entries.push({t:"player",player:cp||LP,cn:ch.cn,text:a});
  let dn="";const dm=a.match(/\/roll\s+(\d*)d(\d+)([+-]\d+)?/i);
  if(dm){const c=+dm[1]||1,s=+dm[2],mod=+dm[3]||0;const rolls=Array.from({length:c},()=>Math.floor(Math.random()*s)+1);
    const tot=rolls.reduce((a,b)=>a+b,0)+mod;dn=`\n[🎲 ${c}d${s}${mod>=0?"+":""}${mod}: ${rolls.join(",")} = ${tot}]`;
    nr.entries.push({t:"dice",text:`🎲 ${ch.cn} rolls ${c}d${s}${mod?(mod>0?"+":"")+mod:""}: [${rolls.join(",")}] = ${tot}`})}
  await fbS('narrative',nr);S.loading=true;render();
  const ni=to.length>1?(((g.currentTurn||0)+1)%to.length):0;
  const nc=to.length>1?(g.players[to[ni]]?.ch?.cn||'next'):ch.cn;
  const raceTraits=RACE_INFO[ch.race]?', Race:'+ch.race+'('+RACE_INFO[ch.race].traits+')':'';
  const slotInfo=CASTER_CLASSES.includes(ch.cls)?(() => {const slots=SPELL_SLOTS[Math.min(ch.lv||1,9)]||{};const parts=[];for(const[lv,max]of Object.entries(slots)){const used=(ch.ssu||{})[lv]||0;parts.push(`Lv${lv}:${max-used}/${max}`)}return parts.length?', Slots:'+parts.join(' '):''})():'';
  const condInfo=(ch.conditions||[]).length?', Conditions:'+ch.conditions.join('/'):'';
  const pm=`[${ch.cn} (${ch.race} ${ch.cls}, Lv${ch.lv}, HP${ch.hp}/${ch.mhp}, AC${ch.ac}, Gold:${ch.gold||0}${raceTraits}${slotInfo}${condInfo}, Inventory:${(ch.inv||[]).join(', ')||'nothing'})]\n${ch.cn}: ${a}${dn}\nResolve, then prompt ${nc}. Use inventory tags for any item/gold/HP changes. Use [SPELL] when spells are cast. Apply racial traits when relevant.`;
  const cv=[...(nr.conv||[]),{role:"user",content:pm}];const tr=cv.length>40?cv.slice(-40):cv;
  const resp=await callDM(tr,g.cal);
  await fbS('game/currentTurn',ni);
  const gFresh=await fbG('game');const notifs=await processGameTags(resp,gFresh);
  const clean=resp.replace(/\[(GIVE|TAKE|TRANSFER|GOLD|HP|CONDITION|CLEAR|XP|DISCOVER|SPELL|LONGREST|SHORTREST):[^\]]*\]/g,'').trim();
  nr.entries.push({t:"dm",text:clean},...notifs);nr.conv=[...tr,{role:"assistant",content:clean}];
  await fbS('narrative',nr);S.loading=false;render()}

// FOG OF WAR
function renderFog(){const c=document.getElementById('fogCanvas');const img=document.getElementById('mapImg');
  if(!c||!img||!img.naturalWidth)return;c.width=img.naturalWidth;c.height=img.naturalHeight;
  const ctx=c.getContext('2d');ctx.fillStyle='rgba(8,8,14,0.88)';ctx.fillRect(0,0,c.width,c.height);
  ctx.globalCompositeOperation='destination-out';
  for(const id of revealed){const loc=LOCATIONS[id];if(!loc)continue;
    const cx=loc.x/100*c.width,cy=loc.y/100*c.height,r=Math.min(c.width,c.height)*0.12;
    const gr=ctx.createRadialGradient(cx,cy,r*0.3,cx,cy,r);gr.addColorStop(0,'rgba(0,0,0,1)');gr.addColorStop(0.6,'rgba(0,0,0,0.8)');gr.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=gr;ctx.beginPath();ctx.arc(cx,cy,r,0,Math.PI*2);ctx.fill()}
  ctx.globalCompositeOperation='source-over'}
function initMap(){const el=document.getElementById('mapInner');const ct=document.getElementById('mapContainer');if(!el||!ct)return;let pan=false,sx=0,sy=0;
  ct.onpointerdown=e=>{if(e.target.closest('.loc-marker,.loc-popup,.map-controls,.dm-panel'))return;pan=true;sx=e.clientX-S.mapX;sy=e.clientY-S.mapY;el.style.cursor='grabbing'};
  ct.onpointermove=e=>{if(!pan)return;S.mapX=e.clientX-sx;S.mapY=e.clientY-sy;upMap()};
  ct.onpointerup=()=>{pan=false;if(el)el.style.cursor='grab'};
  ct.onwheel=e=>{e.preventDefault();S.mapZ=Math.max(.5,Math.min(4,S.mapZ*(e.deltaY>0?.9:1.1)));upMap();renderFog()}}
function upMap(){const el=document.getElementById('mapInner');if(el)el.style.transform=`translate(${S.mapX}px,${S.mapY}px) scale(${S.mapZ})`}
function zoomMap(d){S.mapZ=Math.max(.5,Math.min(4,S.mapZ*(d>0?1.3:.77)));upMap();renderFog()}
function resetMapView(){const ct=document.getElementById('mapContainer');if(!ct)return;S.mapZ=Math.min(ct.clientWidth/1712,ct.clientHeight/912)*.95;S.mapX=(ct.clientWidth-1712*S.mapZ)/2;S.mapY=(ct.clientHeight-912*S.mapZ)/2;upMap();renderFog()}

async function calAdv(n){const g=await fbG('game');if(!g?.cal)return;let c=g.cal;for(let i=0;i<n;i++){c.day++;if(c.day>DPM){c.day=1;c.month=c.month>=12?1:c.month+1}}c.de=(c.de||0)+n;await fbS('game/cal',c);rCal()}
async function calBack(n){const g=await fbG('game');if(!g?.cal)return;let c=g.cal;for(let i=0;i<n;i++){c.day--;if(c.day<1){c.day=DPM;c.month=c.month<=1?12:c.month-1}}c.de=Math.max(0,(c.de||0)-n);await fbS('game/cal',c);rCal()}
async function calSetDay(d){const g=await fbG('game');if(!g?.cal)return;g.cal.day=d;await fbS('game/cal',g.cal);rCal()}
async function calTravel(n){const g=await fbG('game');if(!g?.cal)return;g.cal.td=(g.cal.td||0)+n;g.cal.dsm=(g.cal.dsm||0)+n;await fbS('game/cal',g.cal);rCal()}
async function calMaint(){const g=await fbG('game');if(!g?.cal)return;g.cal.dsm=0;await fbS('game/cal',g.cal);rCal()}
function rCal(){const g=S.game;if(!g?.cal)return;const c=g.cal;const md=MONTHS[(c.month||4)-1];const holy=HOLY.find(h=>h.m===c.month&&h.d===c.day);const w=WX[md.s];const wx=w[(c.month*31+c.day*7)%w.length];
  let h=`<div class="cal-date"><div class="cal-season">${md.i} ${md.s}</div><div class="cal-day">Day ${c.day}</div><div class="cal-month">${md.name}</div><div style="font-size:10px;color:#5a5045;margin-top:4px">${c.de||0} campaign days</div></div>`;
  h+=`<div class="cal-controls"><button class="btn-sm" onclick="calBack(7)">◂Wk</button><button class="btn-sm" onclick="calBack(1)">◂Day</button><button class="btn-sm" onclick="calAdv(1)">Day▸</button><button class="btn-sm" onclick="calAdv(7)">Wk▸</button><button class="btn-sm" onclick="calAdv(30)">Mo▸</button></div>`;
  h+=`<div class="cal-grid">`;for(let i=1;i<=DPM;i++){const td=i===c.day;const dh=HOLY.find(x=>x.m===c.month&&x.d===i);h+=`<div class="cal-cell ${td?'today':''}" onclick="calSetDay(${i})" style="background:${td?md.c:dh?dh.cl+'33':'#202030'};color:${td?'#fff':dh?dh.cl:'#777'}">${i}</div>`}h+=`</div>`;
  if(holy)h+=`<div style="background:#2a2a1a;border:1px solid #6a5a3a44;padding:8px;border-radius:6px;margin-bottom:8px;font-size:12px"><div style="color:${holy.cl};font-weight:600">✦ ${holy.name}</div><div style="color:#8a8070;font-size:11px">${holy.g} — ${holy.desc}</div></div>`;
  h+=`<div style="font-size:13px;color:#b0a890;margin-bottom:12px;font-style:italic">Weather: ${wx}</div>`;
  h+=`<div class="sheet-section"><h3>TRAVEL & GEAR</h3><div class="cal-controls"><button class="btn-sm" onclick="calTravel(1)">+1 Travel</button><button class="btn-sm" onclick="calTravel(3)">+3 Travel</button><button class="btn-sm" style="background:#1a2a1a;border-color:#3a5a3a" onclick="calMaint()">✓ Maintenance</button></div>`;
  h+=`<div style="font-size:12px;color:#8a8070;margin-top:8px">Travel: ${c.td||0} total · ${c.dsm||0} since maintenance</div>`;
  if((c.dsm||0)>=5)h+=`<div style="color:#ff8a65;margin-top:4px">⚠ Gear degrades!</div>`;h+=`</div>`;
  document.getElementById('calBody').innerHTML=h}

  app.innerHTML=`<div class="header"><h1 class="title">AETHELGARD</h1><div class="sub">${solo?'SOLO':'LOBBY'}</div></div><div class="center"><div class="panel">${ps.map(([p,v])=>{const c=v.ch;return`<div class="char-card" style="cursor:default">${c?`<div class="char-name">${esc(c.cn)}</div><div class="char-info">${c.race} ${c.cls} · ${esc(p)} ${p===g.host?'👑':''}</div>`:`<div style="color:#6a6050">${esc(p)} — creating...</div>`}</div>`}).join('')}${isH&&rdy.length>=(solo?1:2)?`<div style="text-align:center"><button class="btn" onclick="startGame()">⚔ Begin Campaign ⚔</button></div>`:''}${isH&&!solo&&rdy.length<2?`<div style="text-align:center;color:#8a6050;font-size:12px;margin-top:8px">Need 2+ players</div>`:''}<div style="text-align:center;margin-top:12px"><button class="btn-sm btn-danger" onclick="resetGame()">Reset</button></div></div></div>`;
  if(g?.started){S.phase="play";render()}return}
if(S.phase==="play"){if(!g)return;const ps=g.players||{};const to=g.turnOrder||[];const ctp=to[g.currentTurn||0];const ctc=ps[ctp]?.ch;const solo=g.mode==='solo';const imt=solo||ctp===LP;const mc=ps[LP]?.ch;const entries=S.narr?.entries||[];const cal=g.cal||{month:4,day:15};const md=MONTHS[(cal.month||4)-1];const isHost=g.host===LP;
  if(S.tab==='map'){app.innerHTML=`<div class="game-wrap"><div class="game-header"><div class="title" style="font-size:16px">AETHELGARD</div><div style="display:flex;gap:4px"><button class="toolbar-btn" onclick="S.tab='story';render()">📜 Story</button><button class="toolbar-btn active">🗺 Map</button></div><div style="font-size:11px;color:#8a8070">${md.i} Day ${cal.day}</div></div>
    <div class="map-container" id="mapContainer"><div class="map-inner" id="mapInner"><img id="mapImg" src="map.png" alt="Aethelgard" onload="S.mapLoaded=true;setTimeout(()=>{resetMapView();renderFog()},50)" style="width:1712px;height:912px"><canvas class="fog-canvas" id="fogCanvas"></canvas>
    ${Object.entries(LOCATIONS).map(([id,loc])=>{const vis=revealed.has(id);const icon=loc.type==='town'?'🏘':loc.type==='dungeon'?'💀':loc.type==='secret'?'❓':loc.type==='poi'?'◆':'🌲';return`<div class="loc-marker loc-${loc.type} ${vis?'':'hidden'}" style="left:${loc.x}%;top:${loc.y}%" onclick="event.stopPropagation();S.selLoc=S.selLoc==='${id}'?null:'${id}';render()"><div class="loc-dot">${icon}</div>${S.selLoc===id?`<div class="loc-popup" onclick="event.stopPropagation()"><h4>${esc(loc.name)}</h4><div class="lt">${loc.type}</div><p>${esc(loc.desc)}</p></div>`:''}</div>`}).join('')}
    </div><div class="map-controls"><button onclick="zoomMap(1)">+</button><button onclick="zoomMap(-1)">−</button><button onclick="resetMapView()">⌂</button></div>
    ${isHost?`<div class="dm-panel"><h4>DM — REVEAL</h4>${Object.entries(LOCATIONS).map(([id,loc])=>{const rev=revealed.has(id);return`<div class="dm-loc ${rev?'revealed':''}" onclick="toggleReveal('${id}')"><input type="checkbox" ${rev?'checked':''} onclick="event.stopPropagation();toggleReveal('${id}')"><span>${esc(loc.name)}</span></div>`}).join('')}</div>`:''}</div></div>`;
    setTimeout(()=>{initMap();if(S.mapLoaded){resetMapView();renderFog()}},50);return}
  app.innerHTML=`<div class="game-wrap"><div class="game-header"><div class="title" style="font-size:16px">AETHELGARD</div><div style="font-size:11px;color:#8a8070">${md.i} Day ${cal.day}, ${md.name}</div></div>
  <div class="toolbar"><button class="toolbar-btn" onclick="openCal()">📅 Calendar</button><button class="toolbar-btn" onclick="openSheet('${LP}')">📋 My Sheet</button>${to.map(p=>{const ch=ps[p]?.ch;return p!==LP?`<button class="toolbar-btn" onclick="openSheet('${p}')">${esc(ch?.cn||p)}</button>`:''}).join('')}<button class="toolbar-btn" onclick="S.tab='map';render()">🗺 Map</button><button class="toolbar-btn btn-danger" style="margin-left:auto" onclick="resetGame()">Reset</button></div>
  <div class="turn-banner" style="background:${imt?'#1a2a1a':'#1a1a2e'};color:${imt?'#6aaf6a':'#c8a96e'};border-bottom:2px solid ${imt?'#6aaf6a':'#c8a96e'}">${S.loading?'⏳ The DM weaves the tale...':imt?`⚔ YOUR TURN — ${esc(mc?.cn||'')}`:`⏳ ${esc(ctc?.cn||'...')}'s turn`}</div>
  <div class="party-strip">${to.map((p,i)=>{const ch=ps[p]?.ch;const cur=i===(g.currentTurn||0);const hp=ch?Math.round(ch.hp/ch.mhp*100):100;const hc=hp<=25?'#c87a6a':hp<=50?'#e8a832':'#6aaf6a';return`<div class="party-member" onclick="openSheet('${p}')" style="background:${cur?'#2a3a2a':'#1a1a28'};border:1px solid ${cur?'#6aaf6a55':'#2a2a3e'}"><div style="font-size:11px;font-weight:600;color:${cur?'#6aaf6a':'#8a8070'}">${esc(ch?.cn||p)} ${cur?'◆':''}</div><div style="font-size:9px;color:${hc}">HP ${ch?.hp||'?'}/${ch?.mhp||'?'}</div>${(ch?.conditions||[]).length?`<div style="font-size:8px;color:#c87a6a;margin-top:1px">${ch.conditions.join(', ')}</div>`:''}</div>`}).join('')}</div>
  <div class="narrative" id="narrative">${entries.map(e=>{if(e.t==='system')return`<div class="msg-system">${esc(e.text)}</div>`;if(e.t==='dice')return`<div class="msg-dice">${esc(e.text)}</div>`;if(e.t==='inv')return`<div class="msg-inv">${e.text}</div>`;if(e.t==='dm')return`<div class="msg-dm">${esc(e.text)}</div>`;if(e.t==='player')return`<div><div class="player-tag">⚔ ${esc(e.cn)} (${esc(e.player)})</div><div class="msg-player">${esc(e.text)}</div></div>`;return''}).join('')}${S.loading?'<div class="msg-system" style="font-size:12px;color:#6a6050">⏳ The DM is writing...</div>':''}<div id="narr-end"></div></div>
  <div class="input-bar"><input type="text" id="actionIn" value="${esc(S.act)}" placeholder="${imt?'What does '+(mc?.cn||'')+' do?':'Waiting for '+(ctc?.cn||'...')}" ${!imt||S.loading?'disabled':''} onkeydown="if(event.key==='Enter'){S.act=this.value;submitAction()}" oninput="S.act=this.value"><button class="btn-sm" style="padding:10px 16px;opacity:${imt&&!S.loading?1:0.4}" onclick="S.act=document.getElementById('actionIn').value;submitAction()" ${!imt||S.loading?'disabled':''}>▸</button></div>
  <div class="footer-bar"><span>/roll 1d20+3</span><span onclick="openCal()">${md.i} ${md.name}, Day ${cal.day}</span><span onclick="resetGame()">Reset</span></div></div>`;
  scrollN();if(imt&&!S.loading){const inp=document.getElementById('actionIn');if(inp)inp.focus()}}}
render();
