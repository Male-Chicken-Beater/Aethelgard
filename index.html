<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0d0d12;--panel:#13131a;--border:#1e1e2a;--gold:#c9a84c;--gold-dim:#8a7a3a;
  --text:#c4b99a;--text-dim:#6a6050;--red:#c44040;--green:#5a9a5a;--blue:#4a7a9a;
  --cyan:#4ac4c4;--orange:#c48a40;--pink:#c44a7a;--purple:#7a4ac4;
  --font-title:'Cinzel',serif;--font-body:'Crimson Text',serif;--font-mono:'IBM Plex Mono',monospace;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--font-body);font-size:16px;overflow:hidden;touch-action:manipulation}
.center{display:flex;justify-content:center;align-items:center;height:100%;padding:12px}
.panel{background:var(--panel);border:1px solid var(--border);border-radius:8px;padding:24px;width:100%;max-width:440px;max-height:90vh;overflow-y:auto}
.title{font-family:var(--font-title);color:var(--gold);font-size:22px;text-align:center;margin-bottom:4px;letter-spacing:2px}
.subtitle{color:var(--text-dim);font-size:13px;text-align:center;margin-bottom:20px;font-style:italic}
label{display:block;font-size:13px;color:var(--text-dim);margin-bottom:4px;margin-top:12px;font-family:var(--font-mono)}
input[type="text"],input[type="number"],select,textarea{width:100%;background:#0a0a10;border:1px solid var(--border);color:var(--text);padding:10px;border-radius:4px;font-family:var(--font-body);font-size:15px;outline:none}
input:focus,select:focus,textarea:focus{border-color:var(--gold-dim)}
textarea{resize:vertical;min-height:60px}
.btn{display:block;width:100%;padding:12px;margin-top:16px;background:linear-gradient(135deg,#2a2418,#1a1810);border:1px solid var(--gold-dim);color:var(--gold);font-family:var(--font-title);font-size:14px;letter-spacing:1px;cursor:pointer;border-radius:4px;text-align:center;transition:all .2s}
.btn:hover{background:linear-gradient(135deg,#3a3420,#2a2418);border-color:var(--gold)}
.btn:disabled{opacity:.4;cursor:default}
.btn-sm{padding:8px 14px;margin-top:8px;font-size:12px;display:inline-block;width:auto}
.btn-danger{border-color:var(--red);color:var(--red)}
.btn-secondary{border-color:var(--border);color:var(--text-dim)}
.btn-row{display:flex;gap:8px;margin-top:12px}
.btn-row .btn{flex:1}

/* GAME LAYOUT */
.game-wrap{display:flex;flex-direction:column;height:100vh;height:100dvh}
.game-header{display:flex;align-items:center;justify-content:space-between;padding:8px 12px;background:var(--panel);border-bottom:1px solid var(--border);min-height:44px;flex-shrink:0}
.game-header .title{font-size:14px;margin:0;letter-spacing:1px}
.header-tabs{display:flex;gap:2px}
.tab-btn{padding:6px 14px;font-family:var(--font-mono);font-size:11px;color:var(--text-dim);background:transparent;border:1px solid transparent;border-radius:4px;cursor:pointer;transition:all .2s}
.tab-btn.active{color:var(--gold);border-color:var(--gold-dim);background:#1a1810}
.tab-btn:hover{color:var(--text)}

/* NARRATIVE */
.game-body{flex:1;overflow:hidden;display:flex;flex-direction:column}
.party-bar{display:flex;gap:6px;padding:8px 12px;overflow-x:auto;flex-shrink:0;border-bottom:1px solid var(--border)}
.party-member{padding:6px 10px;border-radius:6px;cursor:pointer;min-width:70px;text-align:center;flex-shrink:0}
.narrative{flex:1;overflow-y:auto;padding:12px;scroll-behavior:smooth}
.msg-dm{color:var(--text);line-height:1.7;margin-bottom:12px;padding:10px;background:#12121a;border-left:2px solid var(--gold-dim);border-radius:0 4px 4px 0;font-size:15px}
.msg-player{color:#a5c4a5;margin-bottom:8px;padding:8px 10px;background:#0f1a0f;border-radius:4px;font-size:14px}
.msg-system{color:var(--text-dim);font-size:12px;text-align:center;margin:8px 0;font-family:var(--font-mono)}
.msg-dice{color:var(--cyan);font-size:13px;text-align:center;margin:6px 0;font-family:var(--font-mono)}
.player-tag{font-size:11px;color:var(--gold-dim);margin-bottom:2px;font-family:var(--font-mono)}
.input-bar{display:flex;gap:6px;padding:8px 12px;border-top:1px solid var(--border);flex-shrink:0;background:var(--panel)}
.input-bar input{flex:1;font-size:15px}
.footer-bar{display:flex;justify-content:space-between;padding:4px 12px;font-size:10px;color:var(--text-dim);font-family:var(--font-mono);flex-shrink:0;border-top:1px solid #111}
.footer-bar span{cursor:pointer}
.footer-bar span:hover{color:var(--text)}

/* MAP */
.map-container{flex:1;position:relative;overflow:hidden;background:#0a0a10;touch-action:none}
.map-inner{position:absolute;transform-origin:0 0;cursor:grab}
.map-inner:active{cursor:grabbing}
.map-inner img{display:block;user-select:none;-webkit-user-drag:none;pointer-events:none}
.fog-canvas{position:absolute;top:0;left:0;pointer-events:none}
.loc-marker{position:absolute;width:28px;height:28px;transform:translate(-50%,-50%);cursor:pointer;z-index:10;transition:transform .2s}
.loc-marker:hover{transform:translate(-50%,-50%) scale(1.3)}
.loc-marker .dot{width:100%;height:100%;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;border:2px solid;animation:pulse 2s infinite}
.loc-marker.hidden{display:none}
.loc-type-town .dot{background:#2a3a2a;border-color:var(--green);color:var(--green)}
.loc-type-dungeon .dot{background:#3a1a1a;border-color:var(--red);color:var(--red)}
.loc-type-secret .dot{background:#2a2a3a;border-color:var(--purple);color:var(--purple)}
.loc-type-wilderness .dot{background:#1a2a1a;border-color:#4a8a4a;color:#4a8a4a}
.loc-type-poi .dot{background:#2a2a1a;border-color:var(--orange);color:var(--orange)}
@keyframes pulse{0%,100%{box-shadow:0 0 4px rgba(200,168,76,.3)}50%{box-shadow:0 0 12px rgba(200,168,76,.6)}}

.loc-popup{position:absolute;z-index:20;background:var(--panel);border:1px solid var(--gold-dim);border-radius:6px;padding:14px;width:240px;transform:translate(-50%,-110%);pointer-events:auto;box-shadow:0 4px 20px rgba(0,0,0,.6)}
.loc-popup h3{font-family:var(--font-title);color:var(--gold);font-size:14px;margin-bottom:4px}
.loc-popup .type{font-family:var(--font-mono);font-size:10px;color:var(--text-dim);margin-bottom:6px;text-transform:uppercase}
.loc-popup p{font-size:13px;line-height:1.5;color:var(--text)}
.loc-popup .close-pop{position:absolute;top:6px;right:10px;cursor:pointer;color:var(--text-dim);font-size:14px}

/* MAP CONTROLS */
.map-controls{position:absolute;bottom:12px;right:12px;display:flex;flex-direction:column;gap:4px;z-index:15}
.map-controls button{width:36px;height:36px;background:var(--panel);border:1px solid var(--border);color:var(--text);font-size:18px;cursor:pointer;border-radius:4px}
.map-controls button:hover{border-color:var(--gold-dim);color:var(--gold)}
.map-dm-panel{position:absolute;top:8px;left:8px;z-index:15;background:var(--panel);border:1px solid var(--gold-dim);border-radius:6px;padding:10px;max-height:70vh;overflow-y:auto;width:220px;font-size:12px}
.map-dm-panel h4{font-family:var(--font-title);color:var(--gold);font-size:12px;margin-bottom:6px}
.dm-loc-item{display:flex;align-items:center;gap:6px;padding:4px 0;cursor:pointer;color:var(--text-dim);font-family:var(--font-mono);font-size:11px}
.dm-loc-item:hover{color:var(--text)}
.dm-loc-item.revealed{color:var(--green)}
.dm-loc-item input[type="checkbox"]{accent-color:var(--gold)}

/* CHARACTER VAULT */
.vault-card{background:#0a0a10;border:1px solid var(--border);border-radius:6px;padding:14px;margin-bottom:10px;cursor:pointer;transition:border-color .2s}
.vault-card:hover{border-color:var(--gold-dim)}
.vault-card h3{font-family:var(--font-title);color:var(--gold);font-size:15px}
.vault-card .meta{font-size:12px;color:var(--text-dim);font-family:var(--font-mono);margin-top:2px}
.vault-card .desc{font-size:13px;color:var(--text);margin-top:6px;font-style:italic}

/* CHARACTER SHEET PANEL */
.slide-panel{position:fixed;top:0;right:-100%;width:min(380px,100%);height:100%;background:var(--panel);border-left:1px solid var(--border);z-index:100;transition:right .3s;overflow-y:auto;padding:16px}
.slide-panel.open{right:0}
.slide-panel-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.slide-panel-header h2{font-family:var(--font-title);color:var(--gold);font-size:16px}
.slide-panel-close{cursor:pointer;color:var(--text-dim);font-size:20px;padding:4px}
.overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.5);z-index:99;display:none}
.overlay.open{display:block}

.stat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin:10px 0}
.stat-box{text-align:center;background:#0a0a10;border:1px solid var(--border);border-radius:4px;padding:8px 4px}
.stat-box .label{font-size:10px;color:var(--text-dim);font-family:var(--font-mono)}
.stat-box .val{font-size:20px;color:var(--gold);font-family:var(--font-title)}
.stat-box .mod{font-size:11px;color:var(--text-dim)}
.sheet-section{margin:12px 0;padding:10px;background:#0a0a10;border-radius:4px}
.sheet-section h4{font-family:var(--font-title);color:var(--gold-dim);font-size:12px;margin-bottom:6px;letter-spacing:1px}
.inv-item{font-size:13px;padding:2px 0;color:var(--text);display:flex;justify-content:space-between}
.discovered-loc{font-size:12px;padding:3px 0;color:var(--green);font-family:var(--font-mono)}

/* MODE SELECT */
.mode-card{background:#0a0a10;border:1px solid var(--border);border-radius:8px;padding:20px;margin-bottom:12px;cursor:pointer;transition:all .2s;text-align:center}
.mode-card:hover{border-color:var(--gold-dim);background:#12121a}
.mode-card h3{font-family:var(--font-title);color:var(--gold);font-size:16px;margin-bottom:6px}
.mode-card p{font-size:13px;color:var(--text-dim)}
.mode-card .icon{font-size:28px;margin-bottom:8px}

/* SCROLLBAR */
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
@media(max-width:480px){.title{font-size:18px}.panel{padding:16px}.map-dm-panel{width:180px;font-size:11px}}
</style>

function esc(s){if(!s)return'';const d=document.createElement('div');d.textContent=s;return d.innerHTML}
function mod(v){const m=Math.floor((v-10)/2);return m>=0?'+'+m:''+m}
function rollDice(expr){
  const m=expr.match(/^(\d+)d(\d+)([+-]\d+)?$/i);
  if(!m)return null;
  const[,num,sides,bonus]=m;
  let total=0,rolls=[];
  for(let i=0;i<parseInt(num);i++){const r=Math.floor(Math.random()*parseInt(sides))+1;rolls.push(r);total+=r}
  const b=parseInt(bonus||0);total+=b;
  return{rolls,bonus:b,total,expr}
}

function loadVault(){
  if(!state.playerName)return;
  vaultRef=db.ref('vaults/'+state.playerName);
  vaultRef.on('value',snap=>{
    const d=snap.val();
    state.vaultChars=d?Object.entries(d).map(([k,v])=>({id:k,...v})):[];
    if(state.screen==='vault')render();
  });
}

function saveToVault(charData){
  if(!state.playerName)return;
  const id=charData.id||('c_'+Date.now().toString(36));
  const data={...charData,lastPlayed:Date.now()};
  delete data.id;
  db.ref('vaults/'+state.playerName+'/'+id).set(data);
  return id;
}

function deleteFromVault(id){
  if(!state.playerName)return;
  if(confirm('Delete this character permanently?')){
    db.ref('vaults/'+state.playerName+'/'+id).remove();
  }
}

  narrRef.on('value',snap=>{
    const d=snap.val();
    narrativeData=d?Object.values(d).sort((a,b)=>a.ts-b.ts):[];
    render();
    setTimeout(scrollNarrative,100);
  });

  // Listen for revealed locations
  revealRef.on('value',snap=>{
    const d=snap.val();
    revealedLocations=new Set(d?Object.values(d):[]);
    if(state.activeTab==='map')renderFog();
    render();
  });

  // Join
  gameRef.child('players/'+state.playerName).set({
    ...charData,
    joinedAt:Date.now(),
    ready:true
  });

  // Set host if first
  gameRef.child('host').transaction(h=>h||state.playerName);
  state.screen='lobby';
  render();
}

function createSoloGame(charData){
  const gid=genGameId();
  state.gameMode='solo';
  db.ref('games/'+gid).set({
    host:state.playerName,
    mode:'solo',
    status:'playing',
    turn:state.playerName,
    turnOrder:[state.playerName],
    players:{[state.playerName]:{...charData,joinedAt:Date.now(),ready:true}},
    calendar:{day:1,month:0,year:1247}
  });
  joinGame(gid,charData);
  // Auto-start for solo
  setTimeout(()=>startCampaign(),500);
}

function createMultiGame(charData){

  state.gameMode='multi';
  db.ref('games/'+gid).set({
    host:state.playerName,

function startCampaign(){
  if(!gameData)return;
  const players=Object.keys(gameData.players||{});
  const order=[...players];
  gameRef.update({status:'playing',turn:order[0],turnOrder:order});
  
  // Build opening context
  const charDescs=players.map(p=>{
    const c=gameData.players[p];
    return `${c.charName} (${c.race} ${c.class}, played by ${p}): ${c.description||'No description.'}`;
  }).join('\n');

  callDM(`The campaign begins. The following characters are in the party:\n${charDescs}\n\nSet the opening scene. The party has just survived the destruction of Lochvarn and is fleeing south toward Vollhaven. They are exhausted, grieving, and have almost nothing. Begin.`,'system');
}

// ============================================================
// DM API CALL
// ============================================================
async function callDM(playerAction,type='player'){
  if(state.loading)return;
  state.loading=true;
  render();

  // Build message history (last 30 entries for context)
  const recent=narrativeData.slice(-30);
  const messages=[];
  for(const e of recent){
    if(e.t==='dm'){
      messages.push({role:'assistant',content:e.text});
    } else if(e.t==='player'){
      messages.push({role:'user',content:`[${e.charName}]: ${e.text}`});
    } else if(e.t==='system'){
      messages.push({role:'user',content:`[SYSTEM]: ${e.text}`});
    } else if(e.t==='dice'){
      messages.push({role:'user',content:`[DICE]: ${e.text}`});
    }
  }

  // Add current action
  if(type==='player'){
    const myChar=gameData?.players?.[state.playerName];
    messages.push({role:'user',content:`[${myChar?.charName||state.playerName}]: ${playerAction}`});
    narrRef.push({t:'player',player:state.playerName,charName:myChar?.charName||state.playerName,text:playerAction,ts:Date.now()});
  } else {
    messages.push({role:'user',content:`[SYSTEM]: ${playerAction}`});
  }

  // Include character states
  const charStates=Object.entries(gameData?.players||{}).map(([p,c])=>`${c.charName}: HP ${c.hp}/${c.maxHp}, AC ${c.ac}`).join(', ');
  const calState=gameData?.calendar?`, Day ${gameData.calendar.day} of ${MONTHS[gameData.calendar.month]?.name||'Unknown'}`:'';
  const sysAddendum=`\n[Current party status: ${charStates}${calState}]`;
  if(messages.length>0&&messages[messages.length-1].role==='user'){
    messages[messages.length-1].content+=sysAddendum;
  }

  try{
    const resp=await fetch(PROXY_URL,{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        model:'claude-sonnet-4-20250514',
        max_tokens:1000,
        system:SYSTEM_PROMPT,
        messages
      })
    });
    const data=await resp.json();
    let dmText='';
    if(data.content){
      dmText=data.content.map(c=>c.text||'').join('');
    } else if(data.error){
      dmText='[DM Error: '+data.error.message+']';
    }

    // Check for location discoveries
    const discoverPattern=/\[DISCOVER:(\w+)\]/g;
    let match;
    while((match=discoverPattern.exec(dmText))!==null){
      const locId=match[1];
      if(LOCATIONS[locId]&&!revealedLocations.has(locId)){
        revealRef.push(locId);
        // Save to vault
        updateVaultDiscovery(locId);
      }
    }
    // Clean discover tags from display text
    dmText=dmText.replace(/\[DISCOVER:\w+\]/g,'').trim();

    narrRef.push({t:'dm',text:dmText,ts:Date.now()});

    // Advance turn
    if(gameData?.turnOrder?.length>1){
      const order=gameData.turnOrder;
      const idx=order.indexOf(gameData.turn);
      const next=order[(idx+1)%order.length];
      gameRef.child('turn').set(next);
    }

    // Advance calendar (every 4 actions = 1 day)
    const actionCount=narrativeData.filter(e=>e.t==='player').length;
    if(actionCount>0&&actionCount%4===0){
      const cal=gameData.calendar||{day:1,month:0,year:1247};
      let d=cal.day+1;
      let m=cal.month;
      let y=cal.year;
      if(d>MONTHS[m].days){d=1;m++;if(m>=12){m=0;y++}}
      gameRef.child('calendar').set({day:d,month:m,year:y});
    }
  } catch(err){
    narrRef.push({t:'system',text:'[Connection error: '+err.message+']',ts:Date.now()});
  }

  state.loading=false;
  render();
}

function updateVaultDiscovery(locId){
  if(!state.playerName)return;
  // Find current character in vault and update discoveries
  const myChar=gameData?.players?.[state.playerName];
  if(!myChar)return;
  const vaultChar=state.vaultChars.find(c=>c.charName===myChar.charName);
  if(vaultChar){
    const disc=vaultChar.discoveredLocations||[];
    if(!disc.includes(locId)){
      disc.push(locId);
      db.ref('vaults/'+state.playerName+'/'+vaultChar.id+'/discoveredLocations').set(disc);
    }
  }
}

// ============================================================
// SUBMIT ACTION
// ============================================================
function submitAction(){
  const text=state.actionText.trim();
  if(!text||state.loading)return;
  state.actionText='';

  // Dice roll command
  if(text.startsWith('/roll ')){
    const expr=text.slice(6).trim();
    const result=rollDice(expr);
    if(result){
      const myChar=gameData?.players?.[state.playerName];
      narrRef.push({t:'dice',text:`${myChar?.charName||state.playerName} rolls ${result.expr}: [${result.rolls.join(', ')}]${result.bonus?(' '+( result.bonus>0?'+':'')+result.bonus):''}  = ${result.total}`,ts:Date.now()});
      render();
      return;
    }
  }

  callDM(text,'player');
}

// ============================================================
// MAP — FOG OF WAR
// ============================================================
function renderFog(){
  const canvas=document.getElementById('fogCanvas');
  if(!canvas)return;
  const mapImg=document.getElementById('mapImg');
  if(!mapImg||!mapImg.naturalWidth)return;

  canvas.width=mapImg.naturalWidth;
  canvas.height=mapImg.naturalHeight;
  const ctx=canvas.getContext('2d');

  // Fill with dark fog
  ctx.fillStyle='rgba(8,8,14,0.88)';
  ctx.fillRect(0,0,canvas.width,canvas.height);

  // Cut out revealed locations
  ctx.globalCompositeOperation='destination-out';
  for(const locId of revealedLocations){
    const loc=LOCATIONS[locId];
    if(!loc)continue;
    const cx=loc.x/100*canvas.width;
    const cy=loc.y/100*canvas.height;
    const r=Math.min(canvas.width,canvas.height)*0.12; // Reveal radius

    const gradient=ctx.createRadialGradient(cx,cy,r*0.3,cx,cy,r);
    gradient.addColorStop(0,'rgba(0,0,0,1)');
    gradient.addColorStop(0.6,'rgba(0,0,0,0.8)');
    gradient.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=gradient;
    ctx.beginPath();
    ctx.arc(cx,cy,r,0,Math.PI*2);
    ctx.fill();
  }
  ctx.globalCompositeOperation='source-over';
}

// ============================================================
// MAP — PAN & ZOOM
// ============================================================
let mapEl=null;
function initMapControls(){
  mapEl=document.getElementById('mapInner');
  const container=document.getElementById('mapContainer');
  if(!mapEl||!container)return;

  let startDist=0;
  let startZoom=1;

  container.addEventListener('pointerdown',e=>{
    if(e.target.closest('.loc-marker')||e.target.closest('.loc-popup')||e.target.closest('.map-controls')||e.target.closest('.map-dm-panel'))return;
    state.isPanning=true;
    state.panStart={x:e.clientX-state.mapX,y:e.clientY-state.mapY};
    mapEl.style.cursor='grabbing';
  });

  container.addEventListener('pointermove',e=>{
    if(!state.isPanning)return;
    state.mapX=e.clientX-state.panStart.x;
    state.mapY=e.clientY-state.panStart.y;
    updateMapTransform();
  });

  container.addEventListener('pointerup',()=>{
    state.isPanning=false;
    if(mapEl)mapEl.style.cursor='grab';
  });

  container.addEventListener('wheel',e=>{
    e.preventDefault();
    const delta=e.deltaY>0?0.9:1.1;
    state.mapZoom=Math.max(0.5,Math.min(4,state.mapZoom*delta));
    updateMapTransform();
    renderFog();
  },{passive:false});

  // Touch zoom
  container.addEventListener('touchstart',e=>{
    if(e.touches.length===2){
      startDist=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);
      startZoom=state.mapZoom;
    }
  });
  container.addEventListener('touchmove',e=>{
    if(e.touches.length===2){
      const dist=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);
      state.mapZoom=Math.max(0.5,Math.min(4,startZoom*(dist/startDist)));
      updateMapTransform();
    }
  });
}

function updateMapTransform(){
  if(!mapEl)return;
  mapEl.style.transform=`translate(${state.mapX}px,${state.mapY}px) scale(${state.mapZoom})`;
}

function zoomMap(dir){
  state.mapZoom=Math.max(0.5,Math.min(4,state.mapZoom*(dir>0?1.3:0.77)));
  updateMapTransform();
  renderFog();
}

function resetMapView(){
  const container=document.getElementById('mapContainer');
  if(!container)return;
  const cw=container.clientWidth;
  const ch=container.clientHeight;
  // Fit map to container
  state.mapZoom=Math.min(cw/1712,ch/912)*0.95;
  state.mapX=(cw-1920*state.mapZoom)/2;
  state.mapY=(ch-997*state.mapZoom)/2;
  updateMapTransform();
  renderFog();
}

// ============================================================
// DM REVEAL
// ============================================================
function toggleReveal(locId){
  if(revealedLocations.has(locId)){
    // Find and remove
    revealRef.once('value',snap=>{
      const d=snap.val();
      if(!d)return;
      for(const[k,v]of Object.entries(d)){
        if(v===locId){revealRef.child(k).remove();break}
      }
    });
  } else {
    revealRef.push(locId);
    updateVaultDiscovery(locId);
  }
}

      <div style="background:#0a0a10;border:1px solid var(--border);border-radius:4px;padding:10px;margin-bottom:12px">
        <div style="font-size:10px;color:var(--text-dim);font-family:var(--font-mono);margin-bottom:4px">GAME ID (share with friends):</div>
        <div style="font-size:13px;color:var(--gold);font-family:var(--font-mono);word-break:break-all;cursor:pointer" onclick="navigator.clipboard?.writeText('${esc(gameIdDisplay)}');this.textContent='Copied!';setTimeout(()=>this.textContent='${esc(gameIdDisplay)}',1500)">${esc(gameIdDisplay)}</div>
      </div>
      ${players.map(([p,c])=>`
        <div style="display:flex;align-items:center;gap:10px;padding:8px;background:#0a0a10;border:1px solid var(--border);border-radius:4px;margin-bottom:6px">
          <div style="width:32px;height:32px;border-radius:50%;background:var(--panel);border:1px solid var(--gold-dim);display:flex;align-items:center;justify-content:center;font-size:14px">⚔</div>
          <div>
            <div style="font-family:var(--font-title);color:var(--gold);font-size:13px">${esc(c.charName||p)}</div>
            <div style="font-size:11px;color:var(--text-dim)">${esc(c.race||'')} ${esc(c.class||'')} • ${esc(p)}${p===gameData.host?' (host)':''}</div>
          </div>
        </div>
      `).join('')}
      ${isHost?`<button class="btn" ${players.length<1?'disabled':''}onclick="startCampaign()">BEGIN CAMPAIGN${players.length<2?' (waiting for players...)':''}</button>`:`<div style="text-align:center;color:var(--text-dim);font-size:13px;margin-top:12px">Waiting for ${esc(gameData.host)} to start the game...</div>`}
      <button class="btn btn-danger" style="margin-top:8px" onclick="resetGame()">LEAVE GAME</button>
    </div></div>`;
    return;
  }

  // === GAME ===
  if(state.screen==='game'&&gameData){
    const players=Object.entries(gameData.players||{});
    const myChar=gameData.players?.[state.playerName];
    const isMyTurn=gameData.turn===state.playerName;
    const currentTurnPlayer=gameData.turn;
    const ctc=gameData.players?.[currentTurnPlayer];
    const isHost=gameData.host===state.playerName;
    const cal=gameData.calendar||{day:1,month:0,year:1247};
    const md=MONTHS[cal.month]||MONTHS[0];
    const entries=narrativeData;

    app.innerHTML=`
      <div class="game-wrap">
        <div class="game-header">
          <div class="title" style="cursor:pointer" onclick="openSheet('${state.playerName}')">${esc(myChar?.charName||state.playerName)}</div>
          <div class="header-tabs">
            <button class="tab-btn ${state.activeTab==='narrative'?'active':''}" onclick="state.activeTab='narrative';render()">STORY</button>
            <button class="tab-btn ${state.activeTab==='map'?'active':''}" onclick="state.activeTab='map';render();setTimeout(()=>{resetMapView();renderFog()},100)">MAP</button>
          </div>
          <div style="font-size:10px;color:var(--text-dim);font-family:var(--font-mono)">${md.icon} Day ${cal.day}</div>
        </div>

        ${state.activeTab==='narrative'?`
          <div class="game-body">
            <div class="party-bar">
              ${players.map(([p,c])=>{
                const cur=p===currentTurnPlayer;
                const hpPct=c.hp/c.maxHp;
                const hpCol=hpPct<.3?'var(--red)':(hpPct<.6?'var(--orange)':'var(--green)');
                return `<div class="party-member" onclick="openSheet('${p}')" style="background:${cur?'#2a3a2a':'#1a1a28'};border:1px solid ${cur?'#6aaf6a55':'#2a2a3e'}">
                  <div style="font-size:11px;font-weight:600;color:${cur?'var(--green)':'var(--text-dim)'}">${esc(c?.charName||p)} ${cur?'◆':''}</div>
                  <div style="font-size:9px;color:${hpCol}">HP ${c?.hp||'?'}/${c?.maxHp||'?'}</div>
                </div>`;
              }).join('')}
            </div>
            <div class="narrative" id="narrative">
              ${entries.map(e=>{
                if(e.t==='system')return `<div class="msg-system">${esc(e.text)}</div>`;
                if(e.t==='dice')return `<div class="msg-dice">${esc(e.text)}</div>`;
                if(e.t==='dm')return `<div class="msg-dm">${esc(e.text)}</div>`;
                if(e.t==='player')return `<div><div class="player-tag">⚔ ${esc(e.charName)} (${esc(e.player)})</div><div class="msg-player">${esc(e.text)}</div></div>`;
                return '';
              }).join('')}
              ${state.loading?'<div class="msg-system" style="font-size:12px;color:var(--text-dim)">⏳ The DM is writing...</div>':''}
              <div id="narr-end"></div>
            </div>
            <div class="input-bar">
              <input type="text" id="actionIn" value="${esc(state.actionText)}" placeholder="${isMyTurn?'What does '+(myChar?.charName||'')+' do?':'Waiting for '+(ctc?.charName||'...')+'...'}" ${!isMyTurn||state.loading?'disabled':''} onkeydown="if(event.key==='Enter'){state.actionText=this.value;submitAction()}" oninput="state.actionText=this.value">
              <button class="btn-sm" style="padding:10px 16px;background:var(--panel);border:1px solid var(--gold-dim);color:var(--gold);border-radius:4px;cursor:pointer;opacity:${isMyTurn&&!state.loading?1:0.4}" onclick="state.actionText=document.getElementById('actionIn').value;submitAction()" ${!isMyTurn||state.loading?'disabled':''}>▸</button>
            </div>
            <div class="footer-bar">
              <span>/roll 1d20+3</span>
              <span>${md.icon} ${md.name}, Day ${cal.day}, ${cal.year} AE</span>
              <span onclick="resetGame()">Reset</span>
            </div>
          </div>
        `:`
          <div class="map-container" id="mapContainer">
            <div class="map-inner" id="mapInner">
              <img id="mapImg" src="map.png" alt="Aethelgard" onload="state.mapLoaded=true;setTimeout(()=>{resetMapView();renderFog()},50)" style="width:1712px;height:912px">
              <canvas class="fog-canvas" id="fogCanvas"></canvas>
              ${Object.entries(LOCATIONS).map(([id,loc])=>{
                const visible=revealedLocations.has(id);
                const icon=loc.type==='town'?'🏘':loc.type==='dungeon'?'💀':loc.type==='secret'?'❓':loc.type==='poi'?'◆':'🌲';
                return `<div class="loc-marker loc-type-${loc.type} ${visible?'':'hidden'}" style="left:${loc.x}%;top:${loc.y}%" onclick="event.stopPropagation();state.selectedLoc=state.selectedLoc==='${id}'?null:'${id}';render()">
                  <div class="dot">${icon}</div>
                  ${state.selectedLoc===id?`<div class="loc-popup" onclick="event.stopPropagation()">
                    <span class="close-pop" onclick="event.stopPropagation();state.selectedLoc=null;render()">✕</span>
                    <h3>${esc(loc.name)}</h3>
                    <div class="type">${loc.type}${loc.circle?' • Circle: '+loc.circle:''}</div>
                    <p>${esc(loc.desc)}</p>
                  </div>`:''}
                </div>`;
              }).join('')}
            </div>
            <div class="map-controls">
              <button onclick="zoomMap(1)">+</button>
              <button onclick="zoomMap(-1)">−</button>
              <button onclick="resetMapView()">⌂</button>
            </div>
            ${isHost?`
              <div class="map-dm-panel">
                <h4>DM — REVEAL LOCATIONS</h4>
                ${Object.entries(LOCATIONS).map(([id,loc])=>{
                  const rev=revealedLocations.has(id);
                  return `<div class="dm-loc-item ${rev?'revealed':''}" onclick="toggleReveal('${id}')">
                    <input type="checkbox" ${rev?'checked':''} onclick="event.stopPropagation();toggleReveal('${id}')">
                    <span>${esc(loc.name)}</span>
                  </div>`;
                }).join('')}
              </div>
            `:''}
          </div>
        `}
      </div>`;

    if(state.activeTab==='narrative'){
      setTimeout(scrollNarrative,50);
      if(isMyTurn&&!state.loading){
        setTimeout(()=>{const inp=document.getElementById('actionIn');if(inp&&!inp.matches(':focus'))inp.focus()},100);
      }
    }
    if(state.activeTab==='map'){
      setTimeout(()=>{initMapControls();if(state.mapLoaded){resetMapView();renderFog()}},50);
    }
    return;
  }

  // Fallback
  app.innerHTML=`<div class="center"><div class="panel"><div class="title">AETHELGARD</div><p style="color:var(--text-dim);text-align:center">Loading...</p></div></div>`;
}

// ============================================================
// CHARACTER CREATION SUBMIT
// ============================================================
function createCharacter(){
  const charData={
    charName:document.getElementById('ccName').value.trim()||'Unnamed',
    race:document.getElementById('ccRace').value,
    class:document.getElementById('ccClass').value,
    background:document.getElementById('ccBg').value,
    level:1,
    hp:parseInt(document.getElementById('ccHp').value)||12,
    maxHp:parseInt(document.getElementById('ccHp').value)||12,
    ac:parseInt(document.getElementById('ccAc').value)||14,
    str:parseInt(document.getElementById('ccSTR').value)||10,
    dex:parseInt(document.getElementById('ccDEX').value)||10,
    con:parseInt(document.getElementById('ccCON').value)||10,
    int:parseInt(document.getElementById('ccINT').value)||10,
    wis:parseInt(document.getElementById('ccWIS').value)||10,
    cha:parseInt(document.getElementById('ccCHA').value)||10,
    description:document.getElementById('ccDesc').value.trim(),
    inventory:['Worn traveling clothes','Waterskin','Belt pouch (2 cp)'],
    discoveredLocations:[],
    lastPlayed:Date.now()
  };

  // Save to vault
  const vaultId=saveToVault(charData);
  charData._vaultId=vaultId;

  if(state.gameMode==='solo'){
    createSoloGame(charData);
  } else if(state.gameId){
    // Joining existing game
    joinGame(state.gameId,charData);
  } else {
    createMultiGame(charData);
  }
}

function useVaultChar(vaultId){
  const vc=state.vaultChars.find(c=>c.id===vaultId);
  if(!vc)return;
  const charData={...vc,_vaultId:vaultId,lastPlayed:Date.now()};
  delete charData.id;

  // Update vault timestamp
  db.ref('vaults/'+state.playerName+'/'+vaultId+'/lastPlayed').set(Date.now());

  if(state.gameMode==='solo'){
    createSoloGame(charData);
  } else if(state.gameId){
    joinGame(state.gameId,charData);
  } else {
    createMultiGame(charData);
  }
}

// ============================================================
// BOOT
// ============================================================
render();
</script>
</body>
</html>
