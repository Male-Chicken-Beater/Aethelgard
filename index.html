  const hp=getHp(CF.cls);const ch={cn:CF.name.trim(),race:CF.race,cls:CF.cls,bg:CF.bg,desc:CF.desc,
    str:+CF.str||10,dex:+CF.dex||10,con:+CF.con||10,int:+CF.int||10,wis:+CF.wis||10,cha:+CF.cha||10,
    hp,mhp:hp,ac:getAc(CF.cls),lv:1,gold:0,inv:["Backpack","Waterskin","Rations (3 days)","Bedroll"],ssu:{},spells:[],notes:""};
  await fbS(`game/players/${LP}/ch`,ch);S.phase="lobby";render()}

async function startGame(){const g=await fbG('game');const rdy=Object.entries(g.players||{}).filter(([k,v])=>v.ch).map(([k])=>k);
  if(rdy.length<(g.mode==='solo'?1:2)){alert(g.mode==='solo'?"Create your character first":"Need 2+ players");return}
  g.started=true;g.turnOrder=rdy;g.currentTurn=0;await fbS('game',g);
  const cl=rdy.map(p=>{const c=g.players[p].ch;return`${c.cn} (${c.race} ${c.cls}, ${c.bg}) — player:${p}. ${c.desc||""}`}).join("\n");
  const prompt=`Campaign begins.\nCharacters:\n${cl}\n\nSurvivors of Lochvarn on road south. Set opening scene, prompt ${g.players[rdy[0]].ch.cn} to act.`;
  S.loading=true;render();const resp=await callDM([{role:"user",content:prompt}],g.cal);
  processDiscovers(resp);const clean=resp.replace(/\[DISCOVER:\w+\]/g,'').trim();
  await fbS('narrative',{entries:[{t:"system",text:"⚔ The campaign begins. ⚔"},{t:"dm",text:clean}],conv:[{role:"user",content:prompt},{role:"assistant",content:clean}]});
  S.loading=false;S.phase="play";render()}

async function submitAction(){const a=S.act.trim();if(!a||S.loading)return;const g=await fbG('game');
  const to=g.turnOrder||[];const cp=to[g.currentTurn||0];
  if(g.mode!=='solo'&&cp!==LP)return;
  const ch=g.players[cp||LP]?.ch||g.players[LP]?.ch;if(!ch)return;
  const nr=await fbG('narrative')||{entries:[],conv:[]};S.act="";
  nr.entries.push({t:"player",player:cp||LP,cn:ch.cn,text:a});
  let dn="";const dm=a.match(/\/roll\s+(\d*)d(\d+)([+-]\d+)?/i);
  if(dm){const c=+dm[1]||1,s=+dm[2],mod=+dm[3]||0;const rolls=Array.from({length:c},()=>Math.floor(Math.random()*s)+1);
    const tot=rolls.reduce((a,b)=>a+b,0)+mod;dn=`\n[🎲 ${c}d${s}${mod>=0?"+":""}${mod}: ${rolls.join(",")} = ${tot}]`;
    nr.entries.push({t:"dice",text:`🎲 ${ch.cn} rolls ${c}d${s}${mod?(mod>0?"+":"")+mod:""}: [${rolls.join(",")}] = ${tot}`})}
  await fbS('narrative',nr);S.loading=true;render();
  const ni=to.length>1?(((g.currentTurn||0)+1)%to.length):0;
  const nc=to.length>1?(g.players[to[ni]]?.ch?.cn||'next'):ch.cn;
  const pm=`[${ch.cn} (${ch.race} ${ch.cls}, HP${ch.hp}/${ch.mhp}, AC${ch.ac})]\n${ch.cn}: ${a}${dn}\nResolve, then prompt ${nc}.`;
  const cv=[...(nr.conv||[]),{role:"user",content:pm}];const tr=cv.length>40?cv.slice(-40):cv;
  const resp=await callDM(tr,g.cal);
  await fbS('game/currentTurn',ni);
  processDiscovers(resp);const clean=resp.replace(/\[DISCOVER:\w+\]/g,'').trim();
  nr.entries.push({t:"dm",text:clean});nr.conv=[...tr,{role:"assistant",content:clean}];
  await fbS('narrative',nr);S.loading=false;render()}

async function resetGame(){if(!confirm("Delete entire campaign?"))return;await fbS('game',null);await fbS('narrative',null);await fbS('revealed',null);
  LP="";S={phase:"join",pn:"",game:null,narr:null,loading:false,act:"",tab:"story",selLoc:null,mapZ:1,mapX:0,mapY:0,mapLoaded:false};revealed.clear();render()}

// FOG OF WAR
function renderFog(){const c=document.getElementById('fogCanvas');const img=document.getElementById('mapImg');
  if(!c||!img||!img.naturalWidth)return;c.width=img.naturalWidth;c.height=img.naturalHeight;
  const ctx=c.getContext('2d');ctx.fillStyle='rgba(8,8,14,0.88)';ctx.fillRect(0,0,c.width,c.height);
  ctx.globalCompositeOperation='destination-out';
  for(const id of revealed){const loc=LOCATIONS[id];if(!loc)continue;
    const cx=loc.x/100*c.width,cy=loc.y/100*c.height,r=Math.min(c.width,c.height)*0.12;
    const gr=ctx.createRadialGradient(cx,cy,r*0.3,cx,cy,r);gr.addColorStop(0,'rgba(0,0,0,1)');gr.addColorStop(0.6,'rgba(0,0,0,0.8)');gr.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=gr;ctx.beginPath();ctx.arc(cx,cy,r,0,Math.PI*2);ctx.fill()}
  ctx.globalCompositeOperation='source-over'}
function initMap(){const el=document.getElementById('mapInner');const ct=document.getElementById('mapContainer');if(!el||!ct)return;let pan=false,sx=0,sy=0;
  ct.onpointerdown=e=>{if(e.target.closest('.loc-marker,.loc-popup,.map-controls,.dm-panel'))return;pan=true;sx=e.clientX-S.mapX;sy=e.clientY-S.mapY;el.style.cursor='grabbing'};
  ct.onpointermove=e=>{if(!pan)return;S.mapX=e.clientX-sx;S.mapY=e.clientY-sy;upMap()};
  ct.onpointerup=()=>{pan=false;if(el)el.style.cursor='grab'};
  ct.onwheel=e=>{e.preventDefault();S.mapZ=Math.max(.5,Math.min(4,S.mapZ*(e.deltaY>0?.9:1.1)));upMap();renderFog()}}
function upMap(){const el=document.getElementById('mapInner');if(el)el.style.transform=`translate(${S.mapX}px,${S.mapY}px) scale(${S.mapZ})`}
function zoomMap(d){S.mapZ=Math.max(.5,Math.min(4,S.mapZ*(d>0?1.3:.77)));upMap();renderFog()}
function resetMapView(){const ct=document.getElementById('mapContainer');if(!ct)return;S.mapZ=Math.min(ct.clientWidth/1712,ct.clientHeight/912)*.95;S.mapX=(ct.clientWidth-1712*S.mapZ)/2;S.mapY=(ct.clientHeight-912*S.mapZ)/2;upMap();renderFog()}
function toggleReveal(id){if(revealed.has(id)){db.ref('revealed').once('value',s=>{const d=s.val();if(!d)return;for(const[k,v]of Object.entries(d)){if(v===id){db.ref('revealed/'+k).remove();break}}})}else{db.ref('revealed').push(id)}}

// CALENDAR
async function calAdv(n){const g=await fbG('game');if(!g?.cal)return;let c=g.cal;for(let i=0;i<n;i++){c.day++;if(c.day>DPM){c.day=1;c.month=c.month>=12?1:c.month+1}}c.de=(c.de||0)+n;await fbS('game/cal',c);rCal()}
async function calBack(n){const g=await fbG('game');if(!g?.cal)return;let c=g.cal;for(let i=0;i<n;i++){c.day--;if(c.day<1){c.day=DPM;c.month=c.month<=1?12:c.month-1}}c.de=Math.max(0,(c.de||0)-n);await fbS('game/cal',c);rCal()}
async function calSetDay(d){const g=await fbG('game');if(!g?.cal)return;g.cal.day=d;await fbS('game/cal',g.cal);rCal()}
async function calTravel(n){const g=await fbG('game');if(!g?.cal)return;g.cal.td=(g.cal.td||0)+n;g.cal.dsm=(g.cal.dsm||0)+n;await fbS('game/cal',g.cal);rCal()}
async function calMaint(){const g=await fbG('game');if(!g?.cal)return;g.cal.dsm=0;await fbS('game/cal',g.cal);rCal()}
function rCal(){const g=S.game;if(!g?.cal)return;const c=g.cal;const md=MONTHS[(c.month||4)-1];const holy=HOLY.find(h=>h.m===c.month&&h.d===c.day);const w=WX[md.s];const wx=w[(c.month*31+c.day*7)%w.length];
  let h=`<div class="cal-date"><div class="cal-season">${md.i} ${md.s}</div><div class="cal-day">Day ${c.day}</div><div class="cal-month">${md.name}</div><div style="font-size:10px;color:#5a5045;margin-top:4px">${c.de||0} campaign days</div></div>`;
  h+=`<div class="cal-controls"><button class="btn-sm" onclick="calBack(7)">◂Wk</button><button class="btn-sm" onclick="calBack(1)">◂Day</button><button class="btn-sm" onclick="calAdv(1)">Day▸</button><button class="btn-sm" onclick="calAdv(7)">Wk▸</button><button class="btn-sm" onclick="calAdv(30)">Mo▸</button></div>`;
  h+=`<div class="cal-grid">`;for(let i=1;i<=DPM;i++){const td=i===c.day;const dh=HOLY.find(x=>x.m===c.month&&x.d===i);h+=`<div class="cal-cell ${td?'today':''}" onclick="calSetDay(${i})" style="background:${td?md.c:dh?dh.cl+'33':'#202030'};color:${td?'#fff':dh?dh.cl:'#777'}">${i}</div>`}h+=`</div>`;
  if(holy)h+=`<div style="background:#2a2a1a;border:1px solid #6a5a3a44;padding:8px;border-radius:6px;margin-bottom:8px;font-size:12px"><div style="color:${holy.cl};font-weight:600">✦ ${holy.name}</div><div style="color:#8a8070;font-size:11px">${holy.g} — ${holy.desc}</div></div>`;
  h+=`<div style="font-size:13px;color:#b0a890;margin-bottom:12px;font-style:italic">Weather: ${wx}</div>`;
  h+=`<div class="sheet-section"><h3>TRAVEL & GEAR</h3><div class="cal-controls"><button class="btn-sm" onclick="calTravel(1)">+1 Travel</button><button class="btn-sm" onclick="calTravel(3)">+3 Travel</button><button class="btn-sm" style="background:#1a2a1a;border-color:#3a5a3a" onclick="calMaint()">✓ Maintenance</button></div>`;
  h+=`<div style="font-size:12px;color:#8a8070;margin-top:8px">Travel: ${c.td||0} total · ${c.dsm||0} since maintenance</div>`;
  if((c.dsm||0)>=5)h+=`<div style="color:#ff8a65;margin-top:4px">⚠ Gear degrades!</div>`;h+=`</div>`;
  document.getElementById('calBody').innerHTML=h}

async function toggleSlot(p,lv){const g=await fbG('game');const c=g.players[p].ch;if(!c.ssu)c.ssu={};const max=(SPELL_SLOTS[c.lv]||{})[lv]||0;c.ssu[lv]=(c.ssu[lv]||0)>=max?0:(c.ssu[lv]||0)+1;await fbS(`game/players/${p}/ch/ssu`,c.ssu)}
async function addInv(p){const i=document.getElementById('invIn');if(!i?.value.trim())return;const g=await fbG('game');const c=g.players[p].ch;if(!c.inv)c.inv=[];c.inv.push(i.value.trim());await fbS(`game/players/${p}/ch/inv`,c.inv);i.value="";rSheet(p)}
async function rmInv(p,idx){const g=await fbG('game');const c=g.players[p].ch;c.inv.splice(idx,1);await fbS(`game/players/${p}/ch/inv`,c.inv);rSheet(p)}

function rSheet(p){const g=S.game;if(!g?.players?.[p]?.ch)return;const c=g.players[p].ch;const own=p===LP;
  const hpPct=Math.max(0,Math.min(100,(c.hp/c.mhp)*100));const hpC=c.hp<=c.mhp*.25?'#c87a6a':c.hp<=c.mhp*.5?'#e8a832':'#6aaf6a';
  let h=`<div style="text-align:center;margin-bottom:12px"><div style="font-size:18px;color:#c8a96e;font-weight:700;font-family:Cinzel,serif">${esc(c.cn)}</div><div style="font-size:13px;color:#8a8070">${c.race} ${c.cls} (${c.bg}) · Lv ${c.lv}</div></div>`;
  h+=`<div class="sheet-section"><h3>HIT POINTS</h3><div style="background:#1e1e30;border-radius:6px;height:24px;margin-bottom:6px;overflow:hidden"><div style="background:${hpC};height:100%;width:${hpPct}%;border-radius:6px"></div></div>`;
  h+=`<div style="display:flex;justify-content:center;align-items:center;gap:8px">${own?`<button class="btn-sm" onclick="updateCF('${p}','hp',Math.max(0,${c.hp}-1))">−</button>`:''}<span style="font-size:20px;font-weight:700;color:${hpC}">${c.hp}/${c.mhp}</span>${own?`<button class="btn-sm" onclick="updateCF('${p}','hp',Math.min(${c.mhp},${c.hp}+1))">+</button>`:''}</div>`;
  h+=`<div style="text-align:center;font-size:12px;color:#8a8070;margin-top:4px">AC ${c.ac}</div>`;
  if(own)h+=`<div style="text-align:center;margin-top:8px"><button class="btn-sm" style="background:#1a2a1a;border-color:#3a5a3a" onclick="longRest('${p}')">🌙 Long Rest</button></div>`;h+=`</div>`;
  h+=`<div class="sheet-section"><h3>ABILITY SCORES</h3><div style="display:grid;grid-template-columns:repeat(3,1fr);gap:6px;text-align:center">`;
  ['str','dex','con','int','wis','cha'].forEach(s=>{const v=c[s]||10;h+=`<div style="background:#1e1e30;border-radius:6px;padding:6px"><div style="font-size:10px;color:#8a8070">${s.toUpperCase()}</div><div style="font-size:18px;color:#d4cbb8;font-weight:700">${v}</div><div style="font-size:12px;color:#c8a96e">${ms(getMod(v))}</div></div>`});h+=`</div></div>`;

  if(c.lv>=2&&CASTER_CLASSES.includes(c.cls)){const slots=SPELL_SLOTS[Math.min(c.lv,9)]||{};h+=`<div class="sheet-section"><h3>SPELL SLOTS</h3>`;for(let lv=1;lv<=5;lv++){const mx=slots[lv];if(!mx)continue;const used=(c.ssu||{})[lv]||0;h+=`<div class="sheet-row"><span class="lbl">Level ${lv}</span><span>`;for(let i=0;i<mx;i++)h+=`<span class="slot-pip ${i<used?'used':'available'}" onclick="${own?`toggleSlot('${p}',${lv})`:''}"></span>`;h+=`</span></div>`}h+=`</div>`}

    <div class="map-container" id="mapContainer"><div class="map-inner" id="mapInner"><img id="mapImg" src="map.png" alt="Aethelgard" onload="S.mapLoaded=true;setTimeout(()=>{resetMapView();renderFog()},50)" style="width:1712px;height:912px"><canvas class="fog-canvas" id="fogCanvas"></canvas>
    ${Object.entries(LOCATIONS).map(([id,loc])=>{const vis=revealed.has(id);const icon=loc.type==='town'?'🏘':loc.type==='dungeon'?'💀':loc.type==='secret'?'❓':loc.type==='poi'?'◆':'🌲';return`<div class="loc-marker loc-${loc.type} ${vis?'':'hidden'}" style="left:${loc.x}%;top:${loc.y}%" onclick="event.stopPropagation();S.selLoc=S.selLoc==='${id}'?null:'${id}';render()"><div class="loc-dot">${icon}</div>${S.selLoc===id?`<div class="loc-popup" onclick="event.stopPropagation()"><h4>${esc(loc.name)}</h4><div class="lt">${loc.type}</div><p>${esc(loc.desc)}</p></div>`:''}</div>`}).join('')}
    </div><div class="map-controls"><button onclick="zoomMap(1)">+</button><button onclick="zoomMap(-1)">−</button><button onclick="resetMapView()">⌂</button></div>
    ${isHost?`<div class="dm-panel"><h4>DM — REVEAL</h4>${Object.entries(LOCATIONS).map(([id,loc])=>{const rev=revealed.has(id);return`<div class="dm-loc ${rev?'revealed':''}" onclick="toggleReveal('${id}')"><input type="checkbox" ${rev?'checked':''} onclick="event.stopPropagation();toggleReveal('${id}')"><span>${esc(loc.name)}</span></div>`}).join('')}</div>`:''}</div></div>`;
    setTimeout(()=>{initMap();if(S.mapLoaded){resetMapView();renderFog()}},50);return}
  app.innerHTML=`<div class="game-wrap"><div class="game-header"><div class="title" style="font-size:16px">AETHELGARD</div><div style="font-size:11px;color:#8a8070">${md.i} Day ${cal.day}, ${md.name}</div></div>
  <div class="toolbar"><button class="toolbar-btn" onclick="openCal()">📅 Calendar</button><button class="toolbar-btn" onclick="openSheet('${LP}')">📋 My Sheet</button>${to.map(p=>{const ch=ps[p]?.ch;return p!==LP?`<button class="toolbar-btn" onclick="openSheet('${p}')">${esc(ch?.cn||p)}</button>`:''}).join('')}<button class="toolbar-btn" onclick="S.tab='map';render()">🗺 Map</button><button class="toolbar-btn btn-danger" style="margin-left:auto" onclick="resetGame()">Reset</button></div>
  <div class="turn-banner" style="background:${imt?'#1a2a1a':'#1a1a2e'};color:${imt?'#6aaf6a':'#c8a96e'};border-bottom:2px solid ${imt?'#6aaf6a':'#c8a96e'}">${S.loading?'⏳ The DM weaves the tale...':imt?`⚔ YOUR TURN — ${esc(mc?.cn||'')}`:`⏳ ${esc(ctc?.cn||'...')}'s turn`}</div>
  <div class="party-strip">${to.map((p,i)=>{const ch=ps[p]?.ch;const cur=i===(g.currentTurn||0);const hp=ch?Math.round(ch.hp/ch.mhp*100):100;const hc=hp<=25?'#c87a6a':hp<=50?'#e8a832':'#6aaf6a';return`<div class="party-member" onclick="openSheet('${p}')" style="background:${cur?'#2a3a2a':'#1a1a28'};border:1px solid ${cur?'#6aaf6a55':'#2a2a3e'}"><div style="font-size:11px;font-weight:600;color:${cur?'#6aaf6a':'#8a8070'}">${esc(ch?.cn||p)} ${cur?'◆':''}</div><div style="font-size:9px;color:${hc}">HP ${ch?.hp||'?'}/${ch?.mhp||'?'}</div></div>`}).join('')}</div>
  <div class="narrative" id="narrative">${entries.map(e=>{if(e.t==='system')return`<div class="msg-system">${esc(e.text)}</div>`;if(e.t==='dice')return`<div class="msg-dice">${esc(e.text)}</div>`;if(e.t==='dm')return`<div class="msg-dm">${esc(e.text)}</div>`;if(e.t==='player')return`<div><div class="player-tag">⚔ ${esc(e.cn)} (${esc(e.player)})</div><div class="msg-player">${esc(e.text)}</div></div>`;return''}).join('')}${S.loading?'<div class="msg-system" style="font-size:12px;color:#6a6050">⏳ The DM is writing...</div>':''}<div id="narr-end"></div></div>
  <div class="input-bar"><input type="text" id="actionIn" value="${esc(S.act)}" placeholder="${imt?'What does '+(mc?.cn||'')+' do?':'Waiting for '+(ctc?.cn||'...')}" ${!imt||S.loading?'disabled':''} onkeydown="if(event.key==='Enter'){S.act=this.value;submitAction()}" oninput="S.act=this.value"><button class="btn-sm" style="padding:10px 16px;opacity:${imt&&!S.loading?1:0.4}" onclick="S.act=document.getElementById('actionIn').value;submitAction()" ${!imt||S.loading?'disabled':''}>▸</button></div>
  <div class="footer-bar"><span>/roll 1d20+3</span><span onclick="openCal()">${md.i} ${md.name}, Day ${cal.day}</span><span onclick="resetGame()">Reset</span></div></div>`;
  scrollN();if(imt&&!S.loading){const inp=document.getElementById('actionIn');if(inp)inp.focus()}}}
render();
</script></body></html>
